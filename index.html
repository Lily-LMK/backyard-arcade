    // ---------- Scroll Picker Modal ----------
    // Generic scrollable modal list picker used by Quiz (order), Night (date + family).
    // cfg: { list, modalW, scrollOwner, scrollKey, onClose, title, countLabel,
    //        accent, isCurrent(item,idx), getLabel(item,idx), getCount(item,idx)|null, onSelect(item,idx) }
    function drawScrollPicker(cfg){
      clearButtons();

      if(ui.wheel){
        cfg.scrollOwner[cfg.scrollKey] = (cfg.scrollOwner[cfg.scrollKey]||0) + ui.wheel * 0.6;
      }

      const list     = cfg.list;
      const accent   = cfg.accent;
      const modalW   = cfg.modalW;
      const modalMaxH = clamp(H * 0.72, 300, 600);
      const rowH     = 42;
      const headerH  = 56;
      const footerH  = 12;
      const listH    = modalMaxH - headerH - footerH;
      const contentH = list.length * rowH;
      const maxScroll = Math.max(0, contentH - listH);

      cfg.scrollOwner[cfg.scrollKey] = clamp(cfg.scrollOwner[cfg.scrollKey]||0, 0, maxScroll);

      const mx = Math.round((W - modalW) / 2);
      const my = Math.round((H - modalMaxH) / 2);

      // Backdrop
      ctx.fillStyle = 'rgba(0,0,0,0.65)';
      ctx.fillRect(0, 0, W, H);
      addButton(0, 0, W, H, '', cfg.onClose, {ghost:true});

      // Panel
      roundRect(mx, my, modalW, modalMaxH, 20);
      ctx.fillStyle = 'rgba(8,10,18,0.98)'; ctx.fill();
      ctx.strokeStyle = hexToRgba(accent, 0.25); ctx.lineWidth = 1; ctx.stroke();

      // Header title
      ctx.fillStyle = hexToRgba(accent, 0.92);
      ctx.font = '800 15px Barlow, sans-serif';
      ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
      ctx.fillText(cfg.title, mx + 20, my + headerH/2 - 2);

      // Count label (top-right)
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      ctx.font = '500 12px Barlow, sans-serif';
      ctx.textAlign = 'right';
      ctx.fillText(cfg.countLabel, mx + modalW - 50, my + headerH/2 - 2);

      // Close button
      addButton(mx + modalW - 44, my + 12, 32, 32, '✕', cfg.onClose, {fontSize:14, r:8});

      // Divider
      ctx.fillStyle = hexToRgba(accent, 0.12);
      ctx.fillRect(mx + 16, my + headerH - 1, modalW - 32, 1);

      // Clipped list
      const listX = mx;
      const listY  = my + headerH;
      ctx.save();
      ctx.beginPath();
      ctx.rect(listX, listY, modalW, listH);
      ctx.clip();

      const scrollPx = cfg.scrollOwner[cfg.scrollKey] || 0;
      const startI   = Math.floor(scrollPx / rowH);
      const yOff     = -(scrollPx % rowH);

      for(let i = 0; i <= Math.ceil(listH / rowH) + 1; i++){
        const idx  = startI + i;
        if(idx >= list.length) break;
        const item = list[idx];
        const isCur = cfg.isCurrent(item, idx);
        const rowY  = listY + i * rowH + yOff;
        if(rowY + rowH < listY || rowY > listY + listH) continue;

        if(isCur){
          roundRect(listX + 10, rowY + 3, modalW - 20, rowH - 6, 10);
          ctx.fillStyle = hexToRgba(accent, 0.14); ctx.fill();
          ctx.strokeStyle = hexToRgba(accent, 0.30); ctx.lineWidth = 1; ctx.stroke();
          roundRect(listX + 10, rowY + 3, 3, rowH - 6, 2);
          ctx.fillStyle = hexToRgba(accent, 0.8); ctx.fill();
        }

        // Label
        ctx.fillStyle = isCur ? hexToRgba(accent, 0.95) : 'rgba(255,255,255,0.78)';
        ctx.font = isCur ? '700 14px Barlow, sans-serif' : '500 14px Barlow, sans-serif';
        ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
        ctx.fillText(cfg.getLabel(item, idx), listX + 24, rowY + rowH/2);

        // Count badge (optional)
        if(cfg.getCount){
          const badge = cfg.getCount(item, idx);
          if(badge != null){
            ctx.fillStyle = isCur ? hexToRgba(accent, 0.55) : 'rgba(255,255,255,0.28)';
            ctx.font = '500 12px Barlow, sans-serif';
            ctx.textAlign = 'right';
            ctx.fillText(badge, listX + modalW - 22, rowY + rowH/2);
          }
        }

        // Hit area
        addButton(listX + 6, rowY + 1, modalW - 12, rowH - 2, '', ()=>cfg.onSelect(item, idx), {ghost:true});
      }

      ctx.restore();

      // Scrollbar track + thumb
      if(contentH > listH){
        const trackX = mx + modalW - 6;
        const trackH = listH - 8;
        const thumbH = Math.max(24, (listH / contentH) * trackH);
        const thumbY = listY + 4 + (scrollPx / maxScroll) * (trackH - thumbH);
        roundRect(trackX, listY + 4, 3, trackH, 2);
        ctx.fillStyle = 'rgba(255,255,255,0.06)'; ctx.fill();
        roundRect(trackX, thumbY, 3, thumbH, 2);
        ctx.fillStyle = hexToRgba(accent, 0.35); ctx.fill();
      }

      // Fade edges
      const fadeH = 18;
      if(scrollPx > 2){
        const gTop = ctx.createLinearGradient(0, listY, 0, listY + fadeH);
        gTop.addColorStop(0, 'rgba(8,10,18,0.95)');
        gTop.addColorStop(1, 'rgba(8,10,18,0)');
        ctx.fillStyle = gTop;
        ctx.fillRect(mx, listY, modalW - 8, fadeH);
      }
      if(scrollPx < maxScroll - 2){
        const gBot = ctx.createLinearGradient(0, listY + listH - fadeH, 0, listY + listH);
        gBot.addColorStop(0, 'rgba(8,10,18,0)');
        gBot.addColorStop(1, 'rgba(8,10,18,0.95)');
        ctx.fillStyle = gBot;
        ctx.fillRect(mx, listY + listH - fadeH, modalW - 8, fadeH);
      }
    }

    // ---------- Quiz ----------
    function quizToLarge(url){
      // iNaturalist image URLs include a size token (e.g. /medium.jpg). We only want to upscale for Quiz.
      const u = safeStr(url).trim();
      if(!u) return '';
      // Replace the terminal "/medium.<ext>" with "/large.<ext>"
      const v = u.replace(/\/medium(\.[a-z0-9]+)(\?.*)?$/i, '/large$1$2');
      return v || u;
    }
    const quiz = {
      current:null,

      // UI state (not persisted)
      orderPicker:false,
      orderScroll:0,

      toggleMode(){
        state.settings.quizMode = (state.settings.quizMode==='family') ? 'scientific' : 'family';
        saveState();
        this.newQuestion();
        toast('Quiz mode: '+(state.settings.quizMode==='family'?'Family':'Scientific'), 'info', 1200);
      },

      toggleOrderPicker(){
        const hasOrderCol = (data.colMap && data.colMap['taxon_order_name']!=null);
        if(!hasOrderCol || !data.orders || !data.orders.length){
          toast('No taxon_order_name data to filter by.', 'info', 1800);
          this.orderPicker=false;
          return;
        }
        this.orderPicker = !this.orderPicker;
        if(this.orderPicker){
          const cur = state.settings.quizOrder || 'All';
          const list = ['All'].concat(data.orders);
          const idx = Math.max(0, list.indexOf(cur));
          // Center the current order in the visible area (pixel scroll)
          this._scrollPx = Math.max(0, idx * 42 - 160);
        }
      },

      setOrder(ord){
        const hasOrderCol = (data.colMap && data.colMap['taxon_order_name']!=null);
        if(!hasOrderCol) return toast('No order column found in this CSV.', 'info', 1600);
        const o = ord || 'All';
        state.settings.quizOrder = o;
        saveState();
        this.orderPicker=false;
        this.newQuestion();
        toast('Quiz order: '+(o==='All'?'All orders':o), 'info', 1400);
      },

      getPool(mode, ord){
        const m = mode || state.settings.quizMode || 'scientific';
        const o = ord || state.settings.quizOrder || 'All';
        const wantFam = (m==='family');

        if(o==='All') return wantFam ? data.idx.fam : data.idx.sci;

        if(data.idxByOrder && data.idxByOrder[o]){
          return wantFam ? (data.idxByOrder[o].fam || []) : (data.idxByOrder[o].sci || []);
        }
        return wantFam ? data.idx.fam : data.idx.sci;
      },

      getUniverse(mode, ord){
        const m = mode || state.settings.quizMode || 'scientific';
        const o = ord || state.settings.quizOrder || 'All';
        const wantFam = (m==='family');

        if(o!=='All' && data.uniquesByOrder && data.uniquesByOrder[o]){
          const u = wantFam ? data.uniquesByOrder[o].fam : data.uniquesByOrder[o].sci;
          if(u && u.length>=4) return u;
        }
        return wantFam ? data.uniques.fam : data.uniques.sci;
      },

      newQuestion(){
        const mode = state.settings.quizMode || 'scientific';
        const ord = state.settings.quizOrder || 'All';

        const pool = this.getPool(mode, ord);
        if(!pool || pool.length < 4){
          const msg = (ord!=='All')
            ? `Not enough records in ${ord} for quiz (need ≥ 4 usable rows). Try “All orders” or another order.`
            : 'Not enough records for quiz (need ≥ 4 usable rows).';
          this.current={error: msg};
          return;
        }

        const rowIdx=pickValidRow(pool, 900);
        if(rowIdx==null){ this.current={error:'Could not find a usable image_url.'}; return; }

        const row=data.rows[rowIdx];
        const urlMed=getCol(row,'image_url').trim();
        const url=quizToLarge(urlMed) || urlMed;
        const sci=getCol(row,'scientific_name').trim();
        const fam=getCol(row,'taxon_family_name').trim();
        const correct=(mode==='family') ? fam : sci;

        if(!correct){
          // rare but possible: pool drift; just try again
          data.badImage.add(url);
          return this.newQuestion();
        }

        const universe = this.getUniverse(mode, ord);
        const distract=[];
        let a=0;
        while(distract.length<3 && a++<2200){
          const cand=choose(universe);
          if(!cand || cand===correct) continue;
          if(distract.includes(cand)) continue;
          distract.push(cand);
        }

        // As a fallback (tiny orders), allow global universe for distractors
        if(distract.length<3){
          const global = (mode==='family') ? data.uniques.fam : data.uniques.sci;
          let b=0;
          while(distract.length<3 && b++<2200){
            const cand=choose(global);
            if(!cand || cand===correct) continue;
            if(distract.includes(cand)) continue;
            distract.push(cand);
          }
        }

        const choices=distract.concat([correct]);
        for(let i=choices.length-1;i>0;i--){ const j=rnd(i+1); [choices[i],choices[j]]=[choices[j],choices[i]]; }

        this.current={
          mode, order:ord,
          idx:rowIdx, url, urlMed, sci, fam, correct, choices,
          picked:null, pickTime:null,
          _fallbackTried:false,
          img:loadImage(url)
        };
      },

      record(ok){
        const d=bumpDay();
        state.lifetime.quiz.attempts++; state.day[d].quizA++;
        if(ok){ state.lifetime.quiz.correct++; state.day[d].quizC++; }

        // Streak scoring (Quiz)
        if(!state.score) state.score={quiz:0, quizBest:0, match:0, matchBest:0};
        if(ok){
          state.score.quiz = (state.score.quiz||0) + 10;
          state.score.quizBest = Math.max(state.score.quizBest||0, state.score.quiz);
        } else {
          state.score.quiz = 0;
        }

        saveState();
      }
    };


    // ---------- Matching module ----------
    const match = {
      set:null,
      draggables:[],
      slots:[],
      mobileCardIdx:0,
      reset(full=false){
        this.set=null; this.draggables=[]; this.slots=[]; this.mobileCardIdx=0;
        if(state.csv.loaded) this.newSet();
      },
      newSet(){
        const picks=[];
        let tries=0;
        while(picks.length<3 && tries++<3000){
          const idx = data.idx.sci.length ? data.idx.sci[rnd(data.idx.sci.length)] : null;
          if(idx==null) break;
          if(picks.includes(idx)) continue;
          const row=data.rows[idx];
          const url=getCol(row,'image_url').trim();
          const sci=getCol(row,'scientific_name').trim();
          const fam=getCol(row,'taxon_family_name').trim();
          if(!url || !sci || data.badImage.has(url)) continue;
          picks.push(idx);
        }
        if(picks.length<3){ this.set={error:'Not enough usable rows for Matching.'}; return; }

        const items=picks.map(idx=>{
          const row=data.rows[idx];
          return {
            idx, row,
            url:getCol(row,'image_url').trim(),
            sci:getCol(row,'scientific_name').trim(),
            fam:getCol(row,'taxon_family_name').trim() || '(no family)',
            img:loadImage(getCol(row,'image_url').trim())
          };
        });
        this.set={items, done:false, perfect:false};

        const dr=[];
        for(let i=0;i<3;i++){
          dr.push({id:'sci'+i, kind:'sci', text:items[i].sci});
          dr.push({id:'fam'+i, kind:'fam', text:items[i].fam});
        }
        for(let i=dr.length-1;i>0;i--){ const j=rnd(i+1); [dr[i],dr[j]]=[dr[j],dr[i]]; }
        this.draggables = dr.map((d,k)=>({ ...d, x:0,y:0,w:0,h:0, homeX:0, homeY:0, placed:null, order:k, homeSet:false }));

        const slots=[];
        for(let i=0;i<3;i++){
          slots.push({id:'slot_sci_'+i, imgIdx:i, kind:'sci', expectsText:items[i].sci, holds:null, x:0,y:0,w:0,h:0});
          slots.push({id:'slot_fam_'+i, imgIdx:i, kind:'fam', expectsText:items[i].fam, holds:null, x:0,y:0,w:0,h:0});
        }
        this.slots=slots;
      },
      layout(){
        const pad=Math.max(18, Math.min(44, W*0.05));

        if(isMobile() && this.set && !this.set.error){
          const ci=this.mobileCardIdx;
          const top=pad+190;
          const cardW=W - pad*2 - 104;
          const cardH=Math.min(240, H*0.30);
          const slotW=cardW;
          const slotH=52;
          const cx=pad+52;
          for(let i=0;i<3;i++){
            const s1=this.slots.find(s=>s.imgIdx===i && s.kind==='sci');
            const s2=this.slots.find(s=>s.imgIdx===i && s.kind==='fam');
            if(i===ci){
              if(s1){ s1.x=cx; s1.y=top+cardH+14; s1.w=slotW; s1.h=slotH; }
              if(s2){ s2.x=cx; s2.y=top+cardH+14+slotH+10; s2.w=slotW; s2.h=slotH; }
            } else {
              if(s1){ s1.x=-9999; s1.y=-9999; s1.w=slotW; s1.h=slotH; }
              if(s2){ s2.x=-9999; s2.y=-9999; s2.w=slotW; s2.h=slotH; }
            }
          }
          const bankTop=top + cardH + 14 + slotH + 10 + slotH + 18;
          const bankW=W-pad*2;
          const cols=2;
          const rowH=52;
          const bw=(bankW-(cols-1)*14)/cols;
          let unplaced=this.draggables.filter(d=>!d.placed);
          for(let i=0;i<unplaced.length;i++){
            const d=unplaced[i];
            const r=Math.floor(i/cols); const c=i%cols;
            const x=pad+c*(bw+14); const y=bankTop+r*(rowH+12);
            d.w=bw; d.h=rowH; d.homeX=x; d.homeY=y;
            if(!d.homeSet){ d.x=x; d.y=y; d.homeSet=true; }
            else if(ui.drag && ui.drag.id===d.id){ d.x=ui.pointer.x-ui.drag.offx; d.y=ui.pointer.y-ui.drag.offy; }
            else { d.x=lerp(d.x,d.homeX,0.22); d.y=lerp(d.y,d.homeY,0.22); }
          }
          return;
        }

        const top=pad+138;
        const cardW=Math.min(360, (W - pad*2 - 24)/3);
        const cardH=Math.min(320, H*0.36);
        const gap=Math.max(12, (W - pad*2 - cardW*3)/2);

        for(let i=0;i<3;i++){
          const cx=pad + i*(cardW+gap);
          const cy=top;
          const slotW=cardW;
          const slotH=52;
          const s1=this.slots.find(s=>s.imgIdx===i && s.kind==='sci');
          const s2=this.slots.find(s=>s.imgIdx===i && s.kind==='fam');
          if(s1){ s1.x=cx; s1.y=cy+cardH+12; s1.w=slotW; s1.h=slotH; }
          if(s2){ s2.x=cx; s2.y=cy+cardH+12+slotH+12; s2.w=slotW; s2.h=slotH; }
        }

        const bankTop=top + cardH + 12 + 52 + 12 + 52 + 22;
        const bankW = W - pad*2;
        const cols=2;
        const rowH=56;
        const bw=(bankW - (cols-1)*14)/cols;

        let unplaced=this.draggables.filter(d=>!d.placed);
        for(let i=0;i<unplaced.length;i++){
          const d=unplaced[i];
          const r=Math.floor(i/cols);
          const c=i%cols;
          const x=pad + c*(bw+14);
          const y=bankTop + r*(rowH+14);
          d.w=bw; d.h=rowH;
          d.homeX=x; d.homeY=y;
          if(!d.homeSet){
            d.x=x; d.y=y; d.homeSet=true;
          } else if(ui.drag && ui.drag.id===d.id){
            // Track pointer while being dragged
            d.x = ui.pointer.x - ui.drag.offx;
            d.y = ui.pointer.y - ui.drag.offy;
          } else {
            d.x = lerp(d.x, d.homeX, 0.22);
            d.y = lerp(d.y, d.homeY, 0.22);
          }
        }
      },
      pickDrag(px,py){
        for(let i=this.draggables.length-1;i>=0;i--){
          const d=this.draggables[i];
          if(px>=d.x && px<=d.x+d.w && py>=d.y && py<=d.y+d.h) return d;
        }
        return null;
      },
      drop(d){
        for(const s of this.slots){
          if(s.kind!==d.kind) continue;
          if(hitRect(s, ui.pointer.x, ui.pointer.y)){
            if(s.holds && s.holds!==d.id){
              const other=this.draggables.find(x=>x.id===s.holds);
              if(other){ other.placed=null; other.homeSet=true; }
            }
            s.holds=d.id;
            d.placed=s.id;
            d.x=s.x; d.y=s.y; d.w=s.w; d.h=s.h;
            this.check();
            return;
          }
        }
        d.placed=null;
        d.homeSet=true;
        // ensure no slot still references this draggable
        for(const s of this.slots){ if(s.holds===d.id) s.holds=null; }
        if(this.set){ this.set.done=false; this.set.perfect=false; }
      },
      returnAll(){
        if(!this.set || this.set.error) return;
        for(const s of this.slots) s.holds=null;
        for(const d of this.draggables){ d.placed=null; d.homeSet=true; }
        this.set.done=false; this.set.perfect=false;
        toast('Returned all labels.', 'info', 1400);
      },
      check(){
        if(!this.set || this.set.error) return;
        let all=true;
        let perfect=true;
        for(const s of this.slots){
          if(!s.holds){ all=false; continue; }
          const d=this.draggables.find(x=>x.id===s.holds);
          if(!d){ all=false; continue; }
          if(d.text!==s.expectsText) perfect=false;
        }
        if(all){
          this.set.done=true;
          this.set.perfect=perfect;
          const d=bumpDay();
          state.day[d].match++;
          state.lifetime.match.sets++;
          if(perfect) state.lifetime.match.perfect++;
          
          // Streak scoring (Sorting Table)
          if(!state.score) state.score={quiz:0, quizBest:0, match:0, matchBest:0};
          if(perfect){
            state.score.match = (state.score.match||0) + 10;
            state.score.matchBest = Math.max(state.score.matchBest||0, state.score.match);
          } else {
            state.score.match = 0;
          }
          saveState();
          toast(perfect?'Perfect match!':'Placed all — check a couple mismatches.', perfect?'ok':'info',2200);
        }
      }
    };

    // ---------- Sidebar geometry helper ----------
    function sidebarWidth(forScene){
      if(isMobile()) return 0;
      const s = forScene || scene;
      if(s==='snake') return clamp(220 + W*0.03, 200, 280);
      return clamp(320 + W*0.06, 320, 440);
    }
    function gameAreaRect(pad, forScene){
      const s = forScene || scene;
      const sw = (s==='invaders' || s==='snake' || s==='night') ? sidebarWidth(s) : 0;
      const gx = pad;
      const gy = pad+150;
      const gw = W - pad*2 - sw - (sw?12:0);
      const dpadSize = isMobile() ? 48 : 42;
      const bottomReserve = (s==='snake') ? (dpadSize*3 + 6*2 + 32) : 0;
      const gh = H - gy - pad - bottomReserve;
      return {x:gx, y:gy, w:gw, h:gh, sw, sx: gx+gw+12, sy: gy};
    }

    // ---------- Invaders ----------
const invaders = {
  ship:{x:0,y:0,w:58,h:24,vx:0},
  bullets:[],
  ebullets:[],
  enemies:[],
  score:0,
  lives:3,
  level:1,

  stepDir:1,
  groupX:0,
  groupY:0,
  groupVX:54,
  stepDown:18,

  shootTimer:0,
  fireCD:0,

  diveTimer:0,
  ufoTimer:0,
  ufo:null,

  lastHit:null,
  stats:{shots:0,hits:0},

  grid:null,

  finalize(){
    if(this.score > state.lifetime.invaders.best) state.lifetime.invaders.best=this.score;
    saveState();
  },
  endGame(msg){
    this.lives=0;
    toast(msg, 'warn', 2200);
    this.finalize();
  },

  reset(full=false){
    this.bullets=[]; this.ebullets=[]; this.enemies=[];
    this.score=0; this.lives=3; this.level=1;
    this.groupX=0; this.groupY=0; this.stepDir=1;
    this.groupVX=54;
    this.stepDown=18;
    this.shootTimer=0;
    this.fireCD=0;
    this.diveTimer=2.4;
    this.ufoTimer=8 + Math.random()*8;
    this.ufo=null;
    this.lastHit=null;
    this.stats={shots:0,hits:0};

    this.spawnWave();

    const d=bumpDay();
    state.day[d].invaders++;
    state.lifetime.invaders.runs++;
    saveState();
  },

  toggleLabelMode(){
    state.settings.invaderLabel = (state.settings.invaderLabel==='family') ? 'scientific' : 'family';
    saveState();
    toast('Invaders label: '+(state.settings.invaderLabel==='family'?'Family':'Scientific'), 'info', 1100);
  },

  makeEnemyFromRow(idx){
    const row=data.rows[idx];
    const url=getCol(row,'image_url').trim();
    const sci=getCol(row,'scientific_name').trim();
    const fam=getCol(row,'taxon_family_name').trim() || '(no family)';
    const common=getCommonName(row);
    const recordUrl=getRecordUrl(row);
    return {
      idx,url,sci,fam,common,recordUrl,
      alive:true,
      img:loadImage(url),

      detached:false,
      x:0,y:0,
      vx:0,vy:0,
      diveFire:0
    };
  },

  pickRowAny(){
    const pool = data.idx.any.length ? data.idx.any : data.idx.sci;
    return pickValidRow(pool, 7000, true);
  },

  spawnWave(){
    this.enemies.length=0;

    const cols=11, rows=5;
    const total=cols*rows;
    const used=new Set();

    for(let i=0;i<total;i++){
      let idx=this.pickRowAny();
      if(idx==null) continue;
      let guard=0;
      while(used.has(idx) && guard++<50){
        idx=this.pickRowAny();
        if(idx==null) break;
      }
      if(idx==null) continue;
      used.add(idx);
      this.enemies.push(this.makeEnemyFromRow(idx));
    }

    const pad=18;
    const ar=gameAreaRect(pad);
    const cell= Math.min(64, Math.max(44, ar.w/(cols+1)));
    this.grid={cols, rows, cell, size: Math.min(54, cell*0.82)};
    this.groupX = ar.x + 12;
    this.groupY = ar.y + 12;

    this.groupVX = 50 + this.level*12;
    this.stepDown = 16 + this.level*2;
    this.stepDir = 1;
    this.shootTimer = 0;
    this.fireCD = 0;

    this.diveTimer = Math.max(1.8, 4.4 - this.level*0.25) + Math.random()*2.2;
    this.ufoTimer  = Math.max(7.5, 16 - this.level*0.7) + Math.random()*8;
    this.ufo=null;
  },

  fire(){
    if(paused) return;
    if(this.lives<=0) return;
    if(this.fireCD>0) return;
    this.fireCD=0.16;

    const x=this.ship.x + this.ship.w/2;
    const y=this.ship.y - 10;
    this.bullets.push({x,y,vy:-780,alive:true});
    this.stats.shots++;
  },

  enemyBounds(){
    const {cols, cell, size}=this.grid;
    let minC=1e9, maxC=-1e9, minR=1e9, maxR=-1e9;
    for(let i=0;i<this.enemies.length;i++){
      const e=this.enemies[i];
      if(!e || !e.alive || e.detached) continue;
      const c=i%cols, r=Math.floor(i/cols);
      minC=Math.min(minC,c); maxC=Math.max(maxC,c);
      minR=Math.min(minR,r); maxR=Math.max(maxR,r);
    }
    if(maxC<0) return {minX:0,maxX:0,minY:0,maxY:0, empty:true};
    const minX = this.groupX + minC*cell;
    const maxX = this.groupX + maxC*cell + size;
    const minY = this.groupY + minR*cell;
    const maxY = this.groupY + maxR*cell + size;
    return {minX,maxX,minY,maxY, empty:false};
  },

  enemyCenter(i,e){
    const {cols, cell, size}=this.grid;
    if(e.detached) return {cx:e.x, cy:e.y, r:size*0.46};
    const c=i%cols, r=Math.floor(i/cols);
    const ex = this.groupX + c*cell;
    const ey = this.groupY + r*cell;
    return {cx:ex+size/2, cy:ey+size/2, r:size*0.46};
  },

  pickDiverIndex(){
    const cand=[];
    for(let i=0;i<this.enemies.length;i++){
      const e=this.enemies[i];
      if(!e || !e.alive || e.detached) continue;
      cand.push(i);
    }
    if(!cand.length) return null;
    return choose(cand);
  },

  startDive(count=1){
    for(let k=0;k<count;k++){
      const i=this.pickDiverIndex();
      if(i==null) return;
      const e=this.enemies[i];
      const p=this.enemyCenter(i,e);
      e.detached=true;
      e.x=p.cx; e.y=p.cy;
      e.vx=(Math.random()<0.5?-1:1)*(40+Math.random()*70);
      e.vy=140 + this.level*20;
      e.diveFire=0.45 + Math.random()*0.9;
    }
  },

  spawnUFO(ar){
    if(this.ufo) return;
    const idx=this.pickRowAny();
    if(idx==null) return;
    const e=this.makeEnemyFromRow(idx);
    const fromLeft = Math.random()<0.5;
    const y = ar.y + 32;
    const x = fromLeft ? (ar.x - 70) : (ar.x + ar.w + 70);
    const vx = (fromLeft ? 1 : -1) * (190 + this.level*12);
    this.ufo={x,y,vx,e,alive:true};
  },

  update(dt){
    const pad=18;
    const ar=gameAreaRect(pad);

    // Ship controls
    const speed=540;
    let dir=0;
    if(keysDown.has('ArrowLeft')) dir -= 1;
    if(keysDown.has('ArrowRight')) dir += 1;
    if(isMobile()) dir += invadersMobileDir;
    this.ship.vx = lerp(this.ship.vx, dir*speed, 0.22);
    this.ship.x += this.ship.vx*dt;
    this.ship.x = clamp(this.ship.x, ar.x+8, ar.x+ar.w-8-this.ship.w);

    // Timers
    this.fireCD = Math.max(0, this.fireCD - dt);

    // March (formation only)
    const aliveTotal=this.enemies.filter(e=>e && e.alive).length;
    const speedBoost = 1 + (1 - aliveTotal/Math.max(1,this.enemies.length)) * 3.2;
    this.groupX += this.stepDir * this.groupVX * speedBoost * dt;

    const b=this.enemyBounds();
    if(!b.empty){
      if(b.maxX > ar.x+ar.w-10){
        this.stepDir=-1;
        this.groupX -= 10;
        this.groupY += this.stepDown;
      } else if(b.minX < ar.x+10){
        this.stepDir=1;
        this.groupX += 10;
        this.groupY += this.stepDown;
      }
      if(b.maxY >= this.ship.y - 12){
        this.endGame('Overrun at the sheet edge.');
      }
    }

    const shipCx = this.ship.x+this.ship.w/2;
    const shipCy = this.ship.y+this.ship.h/2;

    // Dive attacks
    this.diveTimer -= dt;
    const diveInterval = Math.max(1.8, 6.2 - this.level*0.35);
    if(this.diveTimer<=0 && this.lives>0){
      const n = (this.level>=4 && Math.random()<0.25) ? 2 : 1;
      this.startDive(n);
      this.diveTimer = diveInterval * (0.55 + Math.random()*0.75);
    }

    // Update detached enemies
    for(const e of this.enemies){
      if(!e || !e.alive || !e.detached) continue;

      const ax = clamp((shipCx - e.x) * 1.8, -520, 520);
      e.vx = lerp(e.vx, ax, 0.06);
      e.vy = lerp(e.vy, 260 + this.level*32, 0.05);

      e.x += e.vx*dt;
      e.y += e.vy*dt;

      e.diveFire -= dt;
      if(e.diveFire<=0 && this.lives>0){
        e.diveFire = 0.55 + Math.random()*0.8;
        const dx = shipCx - e.x;
        const vx = clamp(dx*1.2, -220, 220);
        this.ebullets.push({x:e.x, y:e.y+12, vx, vy:520+this.level*28, alive:true});
      }

      // impact
      if(Math.hypot(e.x-shipCx, e.y-shipCy) < 24){
        e.alive=false;
        this.lives--;
        toast('Dive impact!', 'warn', 900);
        if(this.lives<=0) this.finalize();
      } else if(e.y > ar.y+ar.h+60){
        e.alive=false;
        this.lives--;
        toast('A specimen breached the sheet!', 'warn', 1200);
        if(this.lives<=0) this.finalize();
      }
    }

    if(this.lives<=0) return;

    // Player bullets
    for(const p of this.bullets){
      if(!p.alive) continue;
      p.y += p.vy*dt;
      if(p.y < ar.y-40) p.alive=false;
    }

    // Enemy fire (formation)
    this.shootTimer -= dt;
    const baseInterval = Math.max(0.18, 0.95 - this.level*0.11);
    if(this.shootTimer <= 0){
      this.shootTimer = baseInterval * (0.55 + Math.random()*0.75);
      const {cols, cell, size}=this.grid;
      const col = rnd(cols);
      let shooterIdx=null;
      for(let r=this.grid.rows-1;r>=0;r--){
        const i = r*cols + col;
        const e=this.enemies[i];
        if(e && e.alive && !e.detached){ shooterIdx=i; break; }
      }
      if(shooterIdx!=null){
        const c=shooterIdx%cols, r=Math.floor(shooterIdx/cols);
        const sx = this.groupX + c*cell + size/2;
        const sy = this.groupY + r*cell + size + 4;
        this.ebullets.push({x:sx,y:sy,vx:0,vy:460+this.level*34,alive:true});
      }
    }

    // UFO bonus
    this.ufoTimer -= dt;
    if(this.ufoTimer<=0){
      this.spawnUFO(ar);
      this.ufoTimer = Math.max(8, 18 - this.level*0.75) + Math.random()*10;
    }
    if(this.ufo && this.ufo.alive){
      this.ufo.x += this.ufo.vx*dt;
      if(this.ufo.x < ar.x-140 || this.ufo.x > ar.x+ar.w+140) this.ufo=null;
    }

    // Enemy bullets
    for(const b0 of this.ebullets){
      if(!b0.alive) continue;
      b0.x += (b0.vx||0)*dt;
      b0.y += b0.vy*dt;
      if(b0.y > ar.y+ar.h+40) b0.alive=false;
      const cx = shipCx, cy = shipCy;
      if(Math.hypot(b0.x-cx, b0.y-cy) < 22){
        b0.alive=false;
        this.lives--;
        toast('Hit!', 'warn', 850);
        if(this.lives<=0){ this.finalize(); }
      }
    }

    // Collisions
    const {size}=this.grid;
    for(const p of this.bullets){
      if(!p.alive) continue;

      // UFO
      if(this.ufo && this.ufo.alive){
        const u=this.ufo;
        if(Math.hypot(p.x-u.x, p.y-u.y) < size*0.55){
          p.alive=false;
          this.score += 60;
          this.lastHit = u.e;
          this.stats.hits++;
          toast('Bonus specimen! +60', 'ok', 900);
          this.ufo=null;
          continue;
        }
      }

      for(let i=0;i<this.enemies.length;i++){
        const e=this.enemies[i];
        if(!e || !e.alive) continue;
        const pos=this.enemyCenter(i,e);
        if(Math.hypot(p.x-pos.cx, p.y-pos.cy) < pos.r){
          p.alive=false;
          e.alive=false;
          this.score += e.detached ? 18 : 10;
          this.lastHit = e;
          this.stats.hits++;
          break;
        }
      }
    }

    // Clean
    this.bullets=this.bullets.filter(b=>b.alive);
    this.ebullets=this.ebullets.filter(b=>b.alive);

    const anyAlive = this.enemies.some(e=>e && e.alive);
    if(!anyAlive && this.lives>0){
      this.level++;
      this.score += 80;
      toast('Wave cleared! +80', 'ok', 1200);
      this.spawnWave();
    }

    if(this.lives<=0){
      this.finalize();
    }
  }
};

    // ---------- Snake ----------
    const snake = {
      cell:24,
      cols:0, rows:0,
      dir:{x:1,y:0}, nextDir:{x:1,y:0},
      t:0, step:0.13,
      body:[],
      alive:true,
      score:0,
      voiceOn:true,
      lastEat:null,
      flashSpec:null,
      flashUntil:0,
      forbidden:{family:'', rep:null},
      food:null,
      reset(full=false){
        const d=bumpDay();
        state.day[d].snake++;
        state.lifetime.snake.runs++;
        saveState();
        this.voiceOn = (state.settings.snakeVoice!==false);

        this.alive=true;
        this.score=0;
        this.lastEat=null;
        this.flashSpec=null;
        this.flashUntil=0;
        this.forbidden.family=''; this.forbidden.rep=null;
        this.layout();
        this.body=[{x:Math.floor(this.cols*0.35),y:Math.floor(this.rows*0.5)},
                   {x:Math.floor(this.cols*0.35)-1,y:Math.floor(this.rows*0.5)},
                   {x:Math.floor(this.cols*0.35)-2,y:Math.floor(this.rows*0.5)}];
        this.dir={x:1,y:0};
        this.nextDir={x:1,y:0};
        this.t=0;
        this.step=0.14;
        this.spawnFood();
      },
      layout(){
        const pad=Math.max(18, Math.min(44, W*0.05));
        const ar=gameAreaRect(pad, 'snake');
        const target=clamp(Math.min(ar.w, ar.h)/26, 18, 28);
        this.cell=Math.floor(target);
        this.cols=Math.floor(ar.w/this.cell);
        this.rows=Math.floor(ar.h/this.cell);
        this.cols=Math.max(14,this.cols);
        this.rows=Math.max(14,this.rows);
        if(this.food && (this.food.x>=this.cols || this.food.y>=this.rows)) this.spawnFood();
      },
      pickRowAny(){
        const pool=data.idx.any.length?data.idx.any:data.idx.sci;
        return pickValidRow(pool, 6000, true);
      },
      pickForbidden(force=false){
        if(!data.uniques.fam.length){ this.forbidden.family=''; this.forbidden.rep=null; return; }
        const fam=choose(data.uniques.fam)||'';
        this.forbidden.family=fam;

        let rep=null;
        let tries=0;
        while(!rep && tries++<7000){
          const idx=data.idx.fam.length?data.idx.fam[rnd(data.idx.fam.length)]:null;
          if(idx==null) break;
          const row=data.rows[idx];
          const rf=getCol(row,'taxon_family_name').trim();
          if(!rf || safeLower(rf)!==safeLower(fam)) continue;
          const url=getCol(row,'image_url').trim();
          const sci=getCol(row,'scientific_name').trim();
          const common=getCommonName(row);
          const recordUrl=getRecordUrl(row);
          if(!url || !sci || data.badImage.has(url)) continue;
          rep={idx,url,sci,common,fam:rf,recordUrl,img:loadImage(url)};
        }
        this.forbidden.rep=rep;
      },
      spawnFood(){
        const idx=this.pickRowAny();
        if(idx==null) return;
        const row=data.rows[idx];
        const url=getCol(row,'image_url').trim();
        const sci=getCol(row,'scientific_name').trim();
        const fam=getCol(row,'taxon_family_name').trim() || '(no family)';
        const common=getCommonName(row);
        const recordUrl=getRecordUrl(row);

        // Keep food away from edges because it's now larger
        const edge=1;
        let tries=0;
        let fx=edge, fy=edge;
        const occupied=new Set(this.body.map(p=>p.x+','+p.y));
        while(tries++<4000){
          fx=edge + rnd(Math.max(1,this.cols-edge*2));
          fy=edge + rnd(Math.max(1,this.rows-edge*2));
          if(occupied.has(fx+','+fy)) continue;
          break;
        }
        const isForbidden = (safeLower(fam)===safeLower(this.forbidden.family));
        this.food={x:fx,y:fy, idx,url,sci,fam,common,recordUrl, img:loadImage(url), isForbidden};
      },
      setDir(dx,dy){
        if(dx===-this.dir.x && dy===-this.dir.y) return;
        this.nextDir={x:dx,y:dy};
      },
      update(dt){
        if(!this.alive) return;
        if(keysDown.has('ArrowUp')) this.setDir(0,-1);
        else if(keysDown.has('ArrowDown')) this.setDir(0,1);
        else if(keysDown.has('ArrowLeft')) this.setDir(-1,0);
        else if(keysDown.has('ArrowRight')) this.setDir(1,0);

        this.t += dt;
        while(this.t >= this.step){
          this.t -= this.step;
          this.dir = this.nextDir;

          const head=this.body[0];
          let nx=head.x+this.dir.x;
          let ny=head.y+this.dir.y;

          if(nx<0||ny<0||nx>=this.cols||ny>=this.rows){
            this.alive=false;
            toast('Bonk.', 'warn', 1300);
            if(this.score>state.lifetime.snake.best){ state.lifetime.snake.best=this.score; saveState(); }
            return;
          }

          for(const p of this.body){
            if(p.x===nx && p.y===ny){
              this.alive=false;
              toast('Tangled.', 'warn', 1300);
              if(this.score>state.lifetime.snake.best){ state.lifetime.snake.best=this.score; saveState(); }
              return;
            }
          }

          this.body.unshift({x:nx,y:ny});

          if(this.food && nx===this.food.x && ny===this.food.y){
            const eaten=this.food;
            this.lastEat=eaten;
            this.flashSpec=eaten;
            this.flashUntil=performance.now()+1200;

            if(eaten.isForbidden){
              toast('That was the forbidden family!', 'warn', 1600);
              this.score=Math.max(0, this.score-15);
              this.body.pop(); if(this.body.length>3) this.body.pop();
            } else {
              this.score += 10;
              this.step = Math.max(0.07, this.step*0.985);
            }

            if(this.voiceOn && eaten && eaten.sci) tts.speak(eaten.sci);
            this.spawnFood();
          } else {
            this.body.pop();
          }
        }
      }
    };

    // ---------- Night Walk ----------
    const night = {
      dateIndex:0,
      familyFilter:'All',
      datePicker:false,
      familyPicker:false,
      dateScroll:0,
      familyScroll:0,
      session:[],    // row indices
      sprites:[],    // arrivals on sheet
      selected:null, // sprite currently highlighted on the sheet (may be null)
      card:null,     // {idx,sci,common,fam,recordUrl,url,img} shown in detail panel
      cardList:[],   // row indices the prev/next arrows walk through
      cardPos:-1,    // position within cardList
      browseFam:null,// family being browsed (set by clicking a family in the legend)
      modalIdx:null,       // legacy; kept for compatibility
      seenFamilies:[],     // [{fam, count, color}] built as sprites settle
      _famLegendScrollRow: 0,
      familyColorPalette:['#b14c9b','#46c2d2','#f7941d','#00a561','#f95caf','#7bb3ff','#ffcc44','#a8e06d'],
      t:0,
      spawnEvery:0.42,
      nextSpawn:0,
      autoplay:true,
      reset(full=false){
        this.dateIndex=0;
        this.session=[];
        this.sprites=[];
        this.selected=null;
        this.card=null; this.cardList=[]; this.cardPos=-1; this.browseFam=null;
        this.modalIdx=null;
        this.seenFamilies=[];
        this._famLegendScrollRow=0;
        this.t=0;
        this.nextSpawn=0;

        if(state.csv.loaded){
          buildNightIndex();
          if(data.nightDates.length){
            this.dateIndex=0;
            this.loadDate(data.nightDates[this.dateIndex]);
          }
        }
      },
      currentDate(){
        if(!data.nightDates.length) return '';
        return data.nightDates[clamp(this.dateIndex,0,data.nightDates.length-1)];
      },
      toggleDatePicker(){
        this.datePicker = !this.datePicker;
        if(this.datePicker){
          this.familyPicker = false;
          this._dateScrollPx = Math.max(0, this.dateIndex * 42 - 160);
        }
      },
      toggleFamilyPicker(){
        this.familyPicker = !this.familyPicker;
        if(this.familyPicker){
          this.datePicker = false;
          this._famScrollPx = 0;
        }
      },
      setDateIndex(i){

      },
      setFamilyFilter(f){

      },
      familiesForDate(dateStr){
        const fk = data.keys.family;
        if(!fk || !data.nightMap || !data.nightMap[dateStr]) return [];
        const set=new Set();
        for(const idx of data.nightMap[dateStr]){
          const row=data.rows[idx];
          const url=getCol(row,'image_url').trim();
          const sci=getCol(row,'scientific_name').trim();

      },
      loadDate(dateStr){
        this.sprites=[];
        this.selected=null;
        this.card=null; this.cardList=[]; this.cardPos=-1; this.browseFam=null;
        this.modalIdx=null;
        this.seenFamilies=[];
        this._famLegendScrollRow=0;
        this.t=0;
        this.nextSpawn=0;

        if(!data.nightMap || !data.nightMap[dateStr]){
          this.session=[];
          return;
        }
        // Build session list, sorted by time if possible
        const list = data.nightMap[dateStr].slice();
        const tk=data.keys.time;
        if(tk){
          list.sort((a,b)=>{
            const ta=parseTimeVal(getCol(data.rows[a], tk));
            const tb=parseTimeVal(getCol(data.rows[b], tk));
            const na=Number.isNaN(ta), nb=Number.isNaN(tb);
            if(na && nb) return a-b;
            if(na) return 1;
            if(nb) return -1;
            return ta-tb;
          });
        }
        // filter only rows with image_url and sci
        this.session = list.filter(idx=>{
          const row=data.rows[idx];
          const url=getCol(row,'image_url').trim();
          const sci=getCol(row,'scientific_name').trim();
          if(!(url && sci) || data.badImage.has(url)) return false;
          const ff = this.familyFilter;
          const fk = data.keys.family;
          if(ff && ff!=='All' && fk){
            const fam=getCol(row,fk).trim();
            if(fam!==ff) return false;
          }
          return true;
        });
      },
      prevDate(){
        if(!data.nightDates.length) return;
        this.dateIndex = (this.dateIndex+1) % data.nightDates.length;
        this.loadDate(this.currentDate());
        toast(this.currentDate(),'info',800);
      },
      nextDate(){
        if(!data.nightDates.length) return;
        this.dateIndex = (this.dateIndex-1 + data.nightDates.length) % data.nightDates.length;
        this.loadDate(this.currentDate());
        toast(this.currentDate(),'info',800);
      },
      spawnOne(sheet){
        const nextIdx = this.sprites.length;
        if(nextIdx >= this.session.length) return;

        const ridx=this.session[nextIdx];
        const row=data.rows[ridx];
        const url=getCol(row,'image_url').trim();
        const sci=getCol(row,'scientific_name').trim();
        const fam=getCol(row,'taxon_family_name').trim() || '(no family)';
        const common=getCommonName(row);
        const recordUrl=getRecordUrl(row);

        // target position on sheet
        const pad=20;
        const tx = sheet.x + pad + Math.random()*(sheet.w - pad*2);
        const ty = sheet.y + pad + Math.random()*(sheet.h - pad*2);

        const s = 0.86 + Math.random()*0.30;
        const startX = sheet.x + sheet.w*(0.15 + Math.random()*0.70);
        const startY = sheet.y - 80 - Math.random()*120;

        this.sprites.push({
          idx:ridx, url, sci, fam, common, recordUrl,
          img:loadImage(inatPhotoSize(url, 'small')),
          // flight path (quadratic bezier): start -> control -> target
          x:startX, y:startY,
          sx:startX, sy:startY,
          cx: ((startX+tx)/2) + (Math.random()*2-1)*120*s,
          cy: ((startY+ty)/2) - (120 + Math.random()*160),
          tx, ty, s,
          p:0,
          dur: 0.85 + Math.random()*0.80,
          a:0, settled:false, wiggle:Math.random()*Math.PI*2
        });
      },
      update(dt, sheet){
        this.t += dt;
        // auto spawns
        if(this.autoplay && !paused){
          this.nextSpawn -= dt;
          while(this.nextSpawn <= 0){
            if(this.sprites.length >= this.session.length) break;
            this.spawnOne(sheet);
            this.nextSpawn += this.spawnEvery;
          }
        }
        // animate sprites
        for(const sp of this.sprites){
          sp.wiggle += dt*(1.5 + sp.s);
          const wob = Math.sin(sp.wiggle)*0.8;
          sp.a = clamp(sp.a + dt*1.6, 0, 1);
          if(!sp.settled){
            // Fly in on a curved arc, then settle with a gentle flutter.
            sp.p = clamp((sp.p||0) + dt/Math.max(0.25, (sp.dur||1)), 0, 1);
            const t = sp.p;
            const e = 1 - Math.pow(1-t, 3); // easeOutCubic
            const om = 1 - e;

            // quadratic bezier position
            const bx = (om*om)*sp.sx + 2*om*e*sp.cx + (e*e)*sp.tx;
            const by = (om*om)*sp.sy + 2*om*e*sp.cy + (e*e)*sp.ty;

            // flutter fades as it lands
            const flutter = wob * (1.1 - 0.9*e);
            sp.x = bx + Math.sin(sp.wiggle*1.7)*1.8*(1-e);
            sp.y = by + flutter;

            if(sp.p >= 1){
              sp.settled=true;
              sp.x = sp.tx;
              sp.y = sp.ty + wob*0.35;
              if(!sp._famNoted){ sp._famNoted=true; this.noteFamily(sp); }
            }
          } else {
            sp.x = lerp(sp.x, sp.tx, 0.14);
            sp.y = lerp(sp.y, sp.ty + wob, 0.14);
          }
        }
      },
      hitTest(px,py){
        // search topmost first
        for(let i=this.sprites.length-1;i>=0;i--){
          const sp=this.sprites[i];
          const r = 34*sp.s;
          if(Math.hypot(px-sp.x, py-sp.y) <= r) return sp;
        }
        return null;
      },
      swarm(){
        this.selected=null; this.card=null; this.cardList=[]; this.cardPos=-1; this.browseFam=null; this.modalIdx=null;
        const _p=Math.max(18, Math.min(44, W*0.05));
        const _ar=gameAreaRect(_p);
        const _sh={x:_ar.x+22, y:_ar.y+22, w:_ar.w-44, h:_ar.h-44};
        const _spad=24, _r0=34;
        // assign fresh random target positions
        for(const sp of this.sprites){
          if(!sp.settled) continue;
          sp.tx=_sh.x+_spad+Math.random()*(_sh.w-_spad*2);
          sp.ty=_sh.y+_spad+Math.random()*(_sh.h-_spad*2);
        }
        // repulsion passes to separate targets
        for(let _iter=0; _iter<80; _iter++){
          for(let i=0; i<this.sprites.length; i++){
            const a=this.sprites[i]; if(!a.settled) continue;
            const ra=_r0*a.s*1.15;
            for(let j=i+1; j<this.sprites.length; j++){
              const b=this.sprites[j]; if(!b.settled) continue;
              const rb=_r0*b.s*1.15;
              const minD=ra+rb;
              const dx=b.tx-a.tx, dy=b.ty-a.ty;
              const dist=Math.max(0.5, Math.hypot(dx,dy));
              if(dist<minD){
                const push=(minD-dist)*0.5;
                const nx=dx/dist, ny=dy/dist;
                a.tx-=nx*push*0.5; a.ty-=ny*push*0.5;
                b.tx+=nx*push*0.5; b.ty+=ny*push*0.5;
              }
            }
            a.tx=clamp(a.tx, _sh.x+_spad, _sh.x+_sh.w-_spad);
            a.ty=clamp(a.ty, _sh.y+_spad, _sh.y+_sh.h-_spad);
          }
        }
        // un-settle each sprite and give it a new bezier arc to fly to its target
        for(const sp of this.sprites){
          if(!sp.settled) continue;
          sp.sx=sp.x; sp.sy=sp.y;
          sp.cx=((sp.sx+sp.tx)/2)+(Math.random()*2-1)*100*sp.s;
          sp.cy=((sp.sy+sp.ty)/2)-(70+Math.random()*90);
          sp.p=0;
          sp.dur=0.55+Math.random()*0.45;
          sp.settled=false;
        }
      },
      sessionStats(){
        const sciSet=new Set();
        const famSet=new Set();
        for(const idx of this.session){
          const row=data.rows[idx];
          const sci=getCol(row,'scientific_name').trim();
          const fam=getCol(row,'taxon_family_name').trim();
          if(sci) sciSet.add(sci);
          if(fam) famSet.add(fam);
        }
        return {records:this.session.length, species:sciSet.size, families:famSet.size};
      },
      noteFamily(sp){
        const fam=sp.fam||'(no family)';
        const ex=this.seenFamilies.find(f=>f.fam===fam);
        if(ex){ ex.count++; }
        else {
          const color=this.familyColorPalette[this.seenFamilies.length % this.familyColorPalette.length];
          this.seenFamilies.push({fam,count:1,color});
        }
      },
      getFamilyColor(fam){
        const sf=this.seenFamilies.find(f=>f.fam===fam);
        return sf ? sf.color : this.familyColorPalette[0];
      },
      // Build a detail-card record from a dataset row index. Loads the larger
      // (medium) image lazily — only specimens you actually open pull it.
      makeCard(idx){
        const row=data.rows[idx];
        if(!row) return null;
        const url=getCol(row,'image_url').trim();
        return {
          idx,
          sci:getCol(row,'scientific_name').trim(),
          common:getCommonName(row),
          fam:(getCol(row,'taxon_family_name').trim() || '(no family)'),
          recordUrl:getRecordUrl(row),
          url,
          img:loadImage(inatPhotoSize(url, 'medium'))
        };
      },
      // Show a card for a row index and sync the on-sheet selection highlight.
      showCard(idx){
        this.card=this.makeCard(idx);
        this.selected=this.sprites.find(s=>s.idx===idx) || null;
      },
      // Tap a sprite: browse all arrivals (clears any family-browse context).
      openModal(sp){
        this.browseFam=null;
        this.cardList=this.sprites.map(s=>s.idx);
        this.cardPos=this.sprites.indexOf(sp);
        this.showCard(sp.idx);
      },
      // Click a family in the legend: browse just that family's members for the
      // current night (all session rows, in arrival order).
      selectFamily(fam){
        const fk=data.keys.family;
        const list=this.session.filter(idx=>{
          const f=(getCol(data.rows[idx], fk).trim() || '(no family)');
          return f===fam;
        });
        if(!list.length) return;
        this.browseFam=fam;
        this.cardList=list;
        this.cardPos=0;
        this.showCard(list[0]);
      },
      closeModal(){ this.selected=null; this.card=null; this.cardList=[]; this.cardPos=-1; this.browseFam=null; },
      modalNext(){
        if(!this.cardList.length) return;
        this.cardPos=(this.cardPos+1)%this.cardList.length;
        this.showCard(this.cardList[this.cardPos]);
      },
      modalPrev(){
        if(!this.cardList.length) return;
        this.cardPos=(this.cardPos-1+this.cardList.length)%this.cardList.length;
        this.showCard(this.cardList[this.cardPos]);
      },
      // "#N of M records" for a species across the whole dataset.
      speciesRecord(card){
        if(!card || !card.sci) return null;
        const recs=data.sciRecords.get(card.sci);
        if(!recs || !recs.length) return null;
        const pos=recs.indexOf(card.idx);
        return {pos:(pos>=0?pos+1:1), total:recs.length};
      },
      formatObservedTime(sp){
        const tk=data.keys.time;
        if(!tk || sp.idx==null) return '';
        const raw=getCol(data.rows[sp.idx],tk);
        const t=parseTimeVal(raw);
        if(Number.isNaN(t)) return '';
        const d=new Date(t);
        let h=d.getHours(), m=d.getMinutes();
        const ampm=h>=12?'PM':'AM';
        h=h%12; if(h===0) h=12;
        return h+':'+String(m).padStart(2,'0')+' '+ampm;
      }
    };

    // ---------- Pointer-based drag/drop handlers ----------
    function pointerDown(){
      // Matching drag
      if(scene==='match' && match.set && !match.set.error && !paused){
        const d = match.pickDrag(ui.pointer.x, ui.pointer.y);
        if(d){
          // If a label is already placed in a slot, allow picking it back up.
          if(d.placed){
            const s = match.slots.find(x=>x.id===d.placed);
            if(s && s.holds===d.id) s.holds=null;
            d.placed=null;
            if(match.set){ match.set.done=false; match.set.perfect=false; }
          }
          ui.drag={type:'match', id:d.id, offx:ui.pointer.x - d.x, offy:ui.pointer.y - d.y};
          const idx = match.draggables.findIndex(x=>x.id===d.id);
          if(idx>=0){ const [it]=match.draggables.splice(idx,1); match.draggables.push(it); }
          return;
        }
      }

      // Night selection
      if(scene==='night'){
        const sp = night.hitTest(ui.pointer.x, ui.pointer.y);
        if(sp){
          night.openModal(sp);
          return;
        }
      }

      // Invaders mobile touch buttons (hold left/right)
      if(scene==='invaders' && hasTouch()){
        const mpad=Math.max(18, Math.min(44, W*0.05));
        const btnH=52, btnW=90, btnY=H-mpad-btnH;
        const px=ui.pointer.x, py=ui.pointer.y;
        if(py>=btnY && py<=btnY+btnH){
          if(px>=mpad && px<=mpad+btnW){ invadersMobileDir=-1; return; }
          if(px>=mpad+btnW+12 && px<=mpad+btnW*2+12){ invadersMobileDir=1; return; }
        }
      }

      // Snake on-screen D-pad
      if(scene==='snake'){
        const pad=Math.max(18, Math.min(44, W*0.05));
        const ar=gameAreaRect(pad);
        const dpadS=isMobile()?48:42, dpadG=6;
        const dpadW=dpadS*3+dpadG*2;
        const bx=ar.x+(ar.w-dpadW)/2;
        const by=ar.y+ar.h+14;
        const up={x:bx+dpadS+dpadG, y:by, w:dpadS, h:dpadS};
        const left={x:bx, y:by+dpadS+dpadG, w:dpadS, h:dpadS};
        const right={x:bx+(dpadS+dpadG)*2, y:by+dpadS+dpadG, w:dpadS, h:dpadS};
        const down={x:bx+dpadS+dpadG, y:by+(dpadS+dpadG)*2, w:dpadS, h:dpadS};
        const px=ui.pointer.x, py=ui.pointer.y;
        if(hitRect(up,px,py)) snake.setDir(0,-1);
        else if(hitRect(down,px,py)) snake.setDir(0,1);
        else if(hitRect(left,px,py)) snake.setDir(-1,0);
        else if(hitRect(right,px,py)) snake.setDir(1,0);
      }
    }
    function pointerMove(){
      // Invaders mobile: update hold direction on drag
      if(scene==='invaders' && hasTouch() && ui.pointer.down){
        const mpad=Math.max(18, Math.min(44, W*0.05));
        const btnH=52, btnW=90, btnY=H-mpad-btnH;
        const px=ui.pointer.x, py=ui.pointer.y;
        if(py>=btnY && py<=btnY+btnH){
          if(px>=mpad && px<=mpad+btnW){ invadersMobileDir=-1; return; }
          if(px>=mpad+btnW+12 && px<=mpad+btnW*2+12){ invadersMobileDir=1; return; }
        }
        invadersMobileDir=0;
      }
    }
    function pointerUp(){
      invadersMobileDir=0;
      if(ui.drag && ui.drag.type==='match'){ const d = match.draggables.find(x=>x.id===ui.drag.id); if(d) match.drop(d); ui.drag=null; }
    }

    // ---------- Draw camera ship ----------
    function drawCameraShip(x,y,w,h){
      const accent = sceneColors[scene] || palette.red;
      roundRect(x,y,w,h,10);
      ctx.fillStyle=hexToRgba(accent, 0.15); ctx.fill();
      ctx.strokeStyle=hexToRgba(accent, 0.40); ctx.lineWidth=1.5; ctx.stroke();

      const px=x+w*0.22, py=y-h*0.40, pw=w*0.28, ph=h*0.45;
      roundRect(px,py,pw,ph,8);
      ctx.fillStyle=hexToRgba(accent, 0.10); ctx.fill();
      ctx.strokeStyle=hexToRgba(accent, 0.25); ctx.stroke();

      const cx=x+w*0.68, cy=y+h*0.52;
      ctx.beginPath(); ctx.arc(cx,cy,h*0.42,0,Math.PI*2);
      ctx.fillStyle='rgba(0,0,0,0.34)'; ctx.fill();
      ctx.strokeStyle=hexToRgba(accent, 0.30); ctx.stroke();

      ctx.beginPath(); ctx.arc(cx,cy,h*0.22,0,Math.PI*2);
      ctx.strokeStyle=hexToRgba(accent, 0.45); ctx.lineWidth=2; ctx.stroke();
      ctx.lineWidth=1;
    }

    // ---------- Scenes ----------
    function drawHome(dt){
      drawSky(dt);
      clearButtons();
      const pad=Math.max(18, Math.min(44, W*0.05));

      // Atmospheric glow behind brand area
      const _bgGlow = ctx.createRadialGradient(pad+220, pad+26, 0, pad+220, pad+26, 270);
      _bgGlow.addColorStop(0, 'rgba(0,165,97,0.11)');
      _bgGlow.addColorStop(1, 'rgba(0,165,97,0)');
      ctx.fillStyle = _bgGlow;
      ctx.fillRect(0, 0, Math.min(W, 580), 140);

      // Brand title
      ctx.fillStyle='rgba(255,255,255,0.97)';
      ctx.font='900 42px Barlow, sans-serif';
      ctx.textAlign='left'; ctx.textBaseline='top';
      ctx.fillText('BACKYARD ARCADE', pad, pad);
      // Colored accent bar under title
      const tw = ctx.measureText('BACKYARD ARCADE').width;
      const barColors = [palette.green, palette.blue, palette.red, palette.orange, palette.purple, palette.pink];
      const segW = tw / barColors.length;
      for(let i=0;i<barColors.length;i++){
        ctx.fillStyle = hexToRgba(barColors[i], 0.90);
        ctx.fillRect(pad + i*segW, pad+50, segW+1, 4);
      }

      ctx.fillStyle='rgba(255,255,255,0.58)';
      ctx.font='400 14px Barlow, sans-serif';
      ctx.fillText('Interactive study from your iNaturalist observations', pad, pad+62);

      // Top-right buttons: fullscreen | CSV | iNaturalist
      const _fsLbl = document.fullscreenElement ? '⊟' : '⊞';
      addButton(W-pad-38,         pad+10, 38,  38, _fsLbl,       ()=>toggleFullscreen(), {fontSize:17, r:10});
      addButton(W-pad-38-8-100,   pad+10, 100, 38, 'Load CSV',   ()=>fileInput.click(),  {fontSize:14, r:10});
      addButton(W-pad-38-8-100-8-160, pad+10, 160, 38, 'Load iNat', ()=>showINatModal(), {fontSize:14, r:10, accent:palette.green});

      // Instruction text
      ctx.fillStyle='rgba(255,255,255,0.44)';
      ctx.font='400 13px Barlow, sans-serif';
      ctx.fillText('Load from iNaturalist above  •  or drag-drop a CSV  •  Press ? for shortcuts', pad, pad+86);

      // Menu cards
      const cards = [
        { label:'Quiz',              sub:'Multiple choice identification', icon:'?', color:palette.green,  fn:()=>{ if(!state.csv.loaded) toast('Load data first — use Load iNat or drag-drop a CSV.','warn',2800); else { quiz.newQuestion(); goto('quiz'); } }},
        { label:'Sorting Table',     sub:'Drag labels to match specimens', icon:'⇅', color:palette.blue,   fn:()=>{ if(!state.csv.loaded) toast('Load data first — use Load iNat or drag-drop a CSV.','warn',2800); else { match.reset(true); goto('match'); } }},
        { label:'Night Walk',        sub:'Browse observations by date',    icon:'☽', color:palette.purple, fn:()=>{ if(!state.csv.loaded) return toast('Load data first — use Load iNat or drag-drop a CSV.','warn',2800); if(!data.nightDates.length) return toast('No date column found.','warn',3000); const d=bumpDay(); state.day[d].night++; state.lifetime.night.visits++; saveState(); night.reset(true); goto('night'); }},
        { label:'Sheet Invaders',    sub:'Arcade shooter with your data',  icon:'▼', color:palette.red,    fn:()=>{ if(!state.csv.loaded) toast('Load data first — use Load iNat or drag-drop a CSV.','warn',2800); else { invaders.reset(true); goto('invaders'); } }},
        { label:'Specimen Snake',    sub:'Collect specimens, grow longer', icon:'~', color:palette.orange,  fn:()=>{ if(!state.csv.loaded) toast('Load data first — use Load iNat or drag-drop a CSV.','warn',2800); else { snake.reset(true); goto('snake'); } }},
      ];

      const startY = pad + 116;
      const availW = Math.max(320, W - pad*2);
      const availH = H - startY - pad;

      // Responsive: 2 columns if wide enough, else 1
      const useCols = (availW >= 580) ? 2 : 1;
      const gap = 14;
      const cardW = useCols===2 ? Math.min(480, (availW - gap)/2) : Math.min(480, availW);
      const cardH = Math.min(88, Math.max(62, (availH - gap*(cards.length/useCols -1)) / Math.ceil(cards.length/useCols)));

      for(let i=0;i<cards.length;i++){
        const c = cards[i];
        const col = i % useCols;
        const row = Math.floor(i / useCols);
        const cx = pad + col*(cardW + gap);
        const cy = startY + row*(cardH + gap);
        const _hover = hitRect({x:cx,y:cy,w:cardW,h:cardH}, ui.pointer.x, ui.pointer.y);

        // Card glow on hover
        if(_hover){
          ctx.save();
          ctx.shadowColor = hexToRgba(c.color, 0.50);
          ctx.shadowBlur = 24;
          roundRect(cx, cy, cardW, cardH, 14);
          ctx.strokeStyle = hexToRgba(c.color, 0.65);
          ctx.lineWidth = 1.5; ctx.stroke(); ctx.lineWidth = 1;
          ctx.restore();
        }

        // Card gradient background
        const _cGrad = ctx.createLinearGradient(cx, cy, cx + cardW*0.75, cy + cardH);
        _cGrad.addColorStop(0, hexToRgba(c.color, _hover ? 0.28 : 0.18));
        _cGrad.addColorStop(1, hexToRgba(c.color, _hover ? 0.07 : 0.04));
        roundRect(cx, cy, cardW, cardH, 14);
        ctx.fillStyle = _cGrad; ctx.fill();
        ctx.strokeStyle = hexToRgba(c.color, _hover ? 0.55 : 0.30);
        ctx.lineWidth = 1.5; ctx.stroke(); ctx.lineWidth = 1;

        // Left accent bar
        roundRect(cx, cy + 8, 4, cardH - 16, 2);
        ctx.fillStyle = hexToRgba(c.color, _hover ? 0.95 : 0.72);
        ctx.fill();

        // Icon circle
        const iconR = cardH*0.28;
        const iconCx = cx + 24 + iconR;
        const iconCy = cy + cardH/2;
        ctx.beginPath(); ctx.arc(iconCx, iconCy, iconR, 0, Math.PI*2);
        ctx.fillStyle = hexToRgba(c.color, 0.20);
        ctx.fill();
        ctx.strokeStyle = hexToRgba(c.color, 0.44);
        ctx.lineWidth = 1; ctx.stroke();
        ctx.fillStyle = hexToRgba(c.color, _hover ? 1.0 : 0.92);
        ctx.font='700 '+Math.round(iconR*1.1)+'px Barlow, sans-serif';
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(c.icon, iconCx, iconCy);

        // Label
        const textX = iconCx + iconR + 16;
        ctx.fillStyle = _hover ? 'rgba(255,255,255,1.00)' : 'rgba(255,255,255,0.94)';
        ctx.font='700 17px Barlow, sans-serif';
        ctx.textAlign='left'; ctx.textBaseline='middle';
        ctx.fillText(c.label, textX, cy + cardH*0.38);

        // Subtitle
        ctx.fillStyle = _hover ? 'rgba(255,255,255,0.62)' : 'rgba(255,255,255,0.46)';
        ctx.font='400 13px Barlow, sans-serif';
        ctx.fillText(c.sub, textX, cy + cardH*0.67);

        addButton(cx, cy, cardW, cardH, '', c.fn, {ghost:true});
      }

      // CSV status indicator at the bottom
      const statusY = H - pad - 20;
      if(state.csv.loaded){
        ctx.fillStyle = hexToRgba(palette.green, 0.6);
        ctx.font='500 12px Barlow, sans-serif';
        ctx.textAlign='left'; ctx.textBaseline='bottom';
        ctx.fillText('● '+state.csv.filename+'  ('+state.csv.rows+' rows)', pad, statusY);
      } else {
        ctx.fillStyle='rgba(255,255,255,0.25)';
        ctx.font='500 12px Barlow, sans-serif';
        ctx.textAlign='left'; ctx.textBaseline='bottom';
        ctx.fillText('○ No data loaded — use Load iNat or drag-drop a CSV to begin', pad, statusY);
      }

    }

    function drawQuiz(dt){
      drawSky(dt);
      clearButtons();
      const pad=Math.max(18, Math.min(44, W*0.05));
      drawTitle(pad, pad, 'Quiz', 'Guess the '+(state.settings.quizMode==='family'?'family':'scientific name')+' from a random photo');
      drawTopBar(pad);

      // Scoreboard
      if(!isMobile()) drawPillRight(W-pad, pad+64, 'Score: '+((state.score&&state.score.quiz!=null)?state.score.quiz:0)+'  Best: '+((state.score&&state.score.quizBest!=null)?state.score.quizBest:0));

      // Controls
      const ctrlX = pad+284, ctrlY = pad+86, h = 44, gap = 8;
      const avail = Math.max(300, (W - pad) - ctrlX);

      const wNext = 130;
      let wMode = clamp(avail*0.30, 150, 220);
      let wOrder = clamp(avail*0.42, 170, 320);

      // keep things on one line when possible
      if(wMode + wOrder + wNext + gap*2 > avail){
        const excess = (wMode + wOrder + wNext + gap*2) - avail;
        wOrder = Math.max(150, wOrder - excess*0.7);
        wMode  = Math.max(140, wMode  - excess*0.3);
      }

      let x = ctrlX;

      addButton(x, ctrlY, wMode, h,
        'Mode: '+(state.settings.quizMode==='family'?'Family':'Scientific'),
        ()=>{ quiz.orderPicker=false; quiz.toggleMode(); },
        {fontSize:15, r:12, primary:true}
      );
      x += wMode + gap;

      const hasOrderCol = (data.colMap && data.colMap['taxon_order_name']!=null);
      const ord = state.settings.quizOrder || 'All';
      const ordLabel = (ord==='All') ? 'All orders' : ord;

      addButton(x, ctrlY, wOrder, h,
        'Order: ' + ordLabel + (hasOrderCol ? ' ▾' : ''),
        ()=>{
          if(!hasOrderCol) return toast('No taxon_order_name column found in this CSV.', 'info', 1700);
          quiz.toggleOrderPicker();
        },
        {fontSize:14, r:12, primary: quiz.orderPicker}
      );
      const orderBtn = {x, y:ctrlY, w:wOrder, h};
      x += wOrder + gap;

      addButton(x, ctrlY, wNext, h, 'Next', ()=>{ quiz.orderPicker=false; quiz.newQuestion(); }, {fontSize:15, r:12});

      if(!quiz.current) quiz.newQuestion();
      const q=quiz.current;

      const contentTop = pad+152;
      const availH = Math.max(240, H - contentTop - pad);
      const availW = Math.max(320, W - pad*2);
      const panelGap = 16;

      // Prefer side-by-side layout; squeeze image first if needed.
      const imgMinW = isMobile() ? 200 : 320;
      let imgW = clamp(availW*0.62, imgMinW, 760);
      let panelW = availW - imgW - panelGap;
      if(panelW < 280){
        imgW = Math.max(300, availW - 280 - panelGap);
        panelW = availW - imgW - panelGap;
      }

      // If ultra-narrow, fall back to stacked (rare, but better than cut-off UI)
      const useStacked = (panelW < 240);

      const cardH = Math.min(availH, clamp(H*0.56, 300, 540));
      const left = pad, top = contentTop;

      // Smooth parallax pan: tracks mouse position relative to image card centre
      const _panCx = left + (useStacked ? Math.min(660, availW) : clamp(availW*0.62, 320, 760)) * 0.5;
      const _panCy = top + cardH * 0.5;
      quiz._panX = lerp(quiz._panX||0, (ui.pointer.x - _panCx) / W * 14, 0.07);
      quiz._panY = lerp(quiz._panY||0, (ui.pointer.y - _panCy) / H * 10, 0.07);

      if(q && q.error){
        ctx.fillStyle='rgba(255,255,255,0.86)';
        ctx.font='600 16px Barlow, sans-serif';
        ctx.textAlign='left'; ctx.textBaseline='top';
        ctx.fillText(q.error, left, top);
      }

      if(!q) return;

      if(!q.error){
      // ---------- Layout: image + answers ----------
      if(useStacked){
        // stacked fallback (still keeps feedback on-screen by shrinking image card)
        const cardW = Math.min(660, availW);
        const imgCardH = Math.min(cardH, Math.max(240, H*0.42));
        roundRect(left, top, cardW, imgCardH, 18);
        ctx.fillStyle='rgba(255,255,255,0.06)'; ctx.fill();
        ctx.strokeStyle='rgba(255,255,255,0.14)'; ctx.stroke();

        const rec=resolveImageRec(q);
        if(!rec.ready){
          ctx.fillStyle='rgba(255,255,255,0.70)';
          ctx.font='500 14px Barlow, sans-serif';
          ctx.textAlign='left'; ctx.textBaseline='top';
          ctx.fillText('Loading image…', left+18, top+18);
        } else if(!rec.ok){
          ctx.fillStyle='rgba(255,255,255,0.70)';
          ctx.font='500 14px Barlow, sans-serif';
          ctx.textAlign='left'; ctx.textBaseline='top';
          ctx.fillText('Image failed to load. Skipping…', left+18, top+18);
          data.badImage.add(q.url);
          quiz.newQuestion();
          return;
        } else {
          drawFitImage({x:left, y:top, w:cardW, h:imgCardH}, rec.img, 12, 18, quiz._panX, quiz._panY);
          addButton(left+cardW-170, top+14, 156, 40, 'Open record', ()=>{
            try{ window.open(getRecordUrl(data.rows[q.idx]) || q.url, '_blank'); }catch(_){}
          }, {fontSize:14, r:12});
        }

        // choices below, but we cap sizes to fit the viewport
        const choiceTop = top + imgCardH + 16;
        const remaining = Math.max(180, H - choiceTop - pad);
        const cw = cardW;

        const n = q.choices.length;
        const gapY = 10;
        const fbH = 66;
        const headerH = 0;
        const ch = clamp((remaining - fbH - headerH - gapY*(n-1)) / n, 40, 54);

        for(let i=0;i<n;i++){
          const label=q.choices[i];
          const bOpts={fontSize:15, r:14};
          if(q.picked!=null){
            if(label===q.correct) bOpts.accent=palette.green;
            else if(label===q.picked) bOpts.accent=palette.red;
          }
          if(q.picked!=null && q.pickTime!=null && label===q.correct){
            const _e=Math.min(400, performance.now()-q.pickTime);
            bOpts.scale = 1 + Math.sin(_e/400*Math.PI)*0.05;
          }
          addButton(left, choiceTop+i*(ch+gapY), cw, ch, label, ()=>{
            if(paused) return;
            if(q.picked!=null) return;
            q.picked=label; q.pickTime=performance.now();
            const ok=(label===q.correct);
            quiz.record(ok);
            toast(ok?'Correct.':'Not this one.', ok?'ok':'warn', 1200);
          }, bOpts);
        }

        const fbY = choiceTop + n*(ch+gapY) + 10;
        if(q.picked!=null){
          const ok=(q.picked===q.correct);
          ctx.fillStyle = ok ? hexToRgba(palette.green, 0.92) : hexToRgba(palette.red, 0.85);
          ctx.font='800 18px Barlow, sans-serif';
          ctx.textAlign='left'; ctx.textBaseline='top';
          ctx.fillText(ok?'Correct.':'Not this one.', left, fbY);

          ctx.fillStyle='rgba(255,255,255,0.72)';
          ctx.font='500 14px Barlow, sans-serif';
          ctx.fillText('Answer: '+q.correct, left, fbY+26);
        }

      } else {
        // side-by-side primary layout
        const cardW = imgW;
        const panelX = left + cardW + panelGap;
        const panelY = top;
        const panelH = cardH;

        // Image card
        roundRect(left, top, cardW, cardH, 18);
        ctx.fillStyle='rgba(255,255,255,0.06)'; ctx.fill();
        ctx.strokeStyle='rgba(255,255,255,0.14)'; ctx.stroke();

        const rec=q.img || loadImage(q.url);
        if(!rec.ready){
          ctx.fillStyle='rgba(255,255,255,0.70)';
          ctx.font='500 14px Barlow, sans-serif';
          ctx.textAlign='left'; ctx.textBaseline='top';
          ctx.fillText('Loading image…', left+18, top+18);
        } else if(!rec.ok){
          ctx.fillStyle='rgba(255,255,255,0.70)';
          ctx.font='500 14px Barlow, sans-serif';
          ctx.textAlign='left'; ctx.textBaseline='top';
          ctx.fillText('Image failed to load. Skipping…', left+18, top+18);
          data.badImage.add(q.url);
          quiz.newQuestion();
          return;
        } else {
          drawFitImage({x:left, y:top, w:cardW, h:cardH}, rec.img, 12, 18, quiz._panX, quiz._panY);
          addButton(left+cardW-170, top+14, 156, 40, 'Open record', ()=>{
            try{ window.open(getRecordUrl(data.rows[q.idx]) || q.url, '_blank'); }catch(_){}
          }, {fontSize:14, r:12});
        }

        // Answer panel
        roundRect(panelX, panelY, panelW, panelH, 18);
        ctx.fillStyle=hexToRgba(palette.green, 0.08); ctx.fill();
        ctx.strokeStyle=hexToRgba(palette.green, 0.26); ctx.lineWidth=1; ctx.stroke();

        const padIn = 16;
        ctx.fillStyle='rgba(255,255,255,0.86)';
        ctx.font='700 14px Barlow, sans-serif';
        ctx.textAlign='left'; ctx.textBaseline='top';
        ctx.fillText('Choose one:', panelX+padIn, panelY+padIn);

        const n=q.choices.length;
        const fbH = 74;
        const gapY = 10;
        const topY = panelY + padIn + 26;
        const bottomY = panelY + panelH - padIn - fbH;

        const availChoices = Math.max(120, bottomY - topY);
        const ch = clamp((availChoices - gapY*(n-1)) / n, 42, 56);

        for(let i=0;i<n;i++){
          const label=q.choices[i];
          const bOpts={fontSize:15, r:14};
          if(q.picked!=null){
            if(label===q.correct) bOpts.accent=palette.green;
            else if(label===q.picked) bOpts.accent=palette.red;
          }
          if(q.picked!=null && q.pickTime!=null && label===q.correct){
            const _e=Math.min(400, performance.now()-q.pickTime);
            bOpts.scale = 1 + Math.sin(_e/400*Math.PI)*0.05;
          }
          addButton(panelX+padIn, topY+i*(ch+gapY), panelW-padIn*2, ch, label, ()=>{
            if(paused) return;
            if(q.picked!=null) return;
            q.picked=label; q.pickTime=performance.now();
            const ok=(label===q.correct);
            quiz.record(ok);
            toast(ok?'Correct.':'Not this one.', ok?'ok':'warn', 1200);
          }, bOpts);
        }

        // Feedback pinned near bottom of panel
        if(q.picked!=null){
          const ok=(q.picked===q.correct);
          const fbX = panelX + padIn;
          const fbY = panelY + panelH - padIn - fbH;

          ctx.fillStyle = ok ? hexToRgba(palette.green, 0.92) : hexToRgba(palette.red, 0.85);
          ctx.font='900 18px Barlow, sans-serif';
          ctx.textAlign='left'; ctx.textBaseline='top';
          ctx.fillText(ok?'Correct.':'Not this one.', fbX, fbY+2);

          ctx.fillStyle='rgba(255,255,255,0.72)';
          ctx.font='600 14px Barlow, sans-serif';
          ctx.fillText('Answer: '+q.correct, fbX, fbY+30);

          ctx.fillStyle='rgba(255,255,255,0.48)';

    function drawMatch(dt){
      drawSky(dt);
      clearButtons();

      const pad=Math.max(18, Math.min(44, W*0.05));
      drawTitle(pad, pad, 'Sorting Table', 'Drag labels onto their correct slots under each photo');
      drawTopBar(pad);

      // Scoreboard
      if(!isMobile()) drawPillRight(W-pad, pad+64, 'Score: '+((state.score&&state.score.match!=null)?state.score.match:0)+'  Best: '+((state.score&&state.score.matchBest!=null)?state.score.matchBest:0));

      if(isMobile()){
        // Put match controls on a second row below top bar
        const bw2=(W-pad*2-10)/2;
        addButton(pad, pad+138, bw2, 40, 'New set', ()=>{ if(!state.csv.loaded) return toast('Load a CSV first.','warn',1600); match.reset(true); }, {fontSize:13, r:10, primary:true});
        addButton(pad+bw2+10, pad+138, bw2, 40, 'Return all', ()=>{ if(match.set && !match.set.error) match.returnAll(); }, {fontSize:13, r:10});
      } else {
        addButton(pad+284, pad+86, 180, 44, 'New set', ()=>{
          if(!state.csv.loaded) return toast('Load a CSV first.', 'warn', 1600);
          match.reset(true);
        }, {fontSize:15, r:12, primary:true});
        addButton(pad+474, pad+86, 180, 44, 'Return all', ()=>{
          if(match.set && !match.set.error) match.returnAll();
        }, {fontSize:15, r:12});
      }

      if(!match.set) match.reset(true);
      if(match.set && match.set.error){
        ctx.fillStyle='rgba(255,255,255,0.86)';
        ctx.font='600 16px Barlow, sans-serif';
        ctx.textAlign='left'; ctx.textBaseline='top';
        ctx.fillText(match.set.error, pad, isMobile() ? pad+200 : pad+140);
        return;
      }

      match.layout();

      const items=match.set.items;
      if(isMobile()){
        // Single-card carousel
        const ci=match.mobileCardIdx;
        const top=pad+190;
        const cardW=W - pad*2 - 104;
        const cardH=Math.min(240, H*0.30);
        const cx=pad+52, cy=top;

        // ◀ ▶ arrows
        addButton(pad, cy+(cardH-48)/2, 44, 48, '◀', ()=>{ match.mobileCardIdx=(ci+2)%3; }, {fontSize:18, r:12});
        addButton(W-pad-44, cy+(cardH-48)/2, 44, 48, '▶', ()=>{ match.mobileCardIdx=(ci+1)%3; }, {fontSize:18, r:12});

        // Card
        roundRect(cx,cy,cardW,cardH,18);
        ctx.fillStyle=hexToRgba(palette.blue, 0.06); ctx.fill();
        ctx.strokeStyle=hexToRgba(palette.blue, 0.22); ctx.lineWidth=1; ctx.stroke();
        const rec=items[ci].img;
        if(rec.ready && rec.ok && rec.img){ drawFitImage({x:cx, y:cy, w:cardW, h:cardH}, rec.img, 10, 18); }
        else { ctx.fillStyle='rgba(255,255,255,0.70)'; ctx.font='600 14px Barlow, sans-serif'; ctx.textAlign='left'; ctx.textBaseline='top'; ctx.fillText('Loading…', cx+14, cy+14); }

        // Dot indicators
        const dotY=cy+cardH+6;
        for(let di=0;di<3;di++){
          ctx.beginPath(); ctx.arc(cx+cardW/2 + (di-1)*16, dotY, di===ci?5:3, 0, Math.PI*2);
          ctx.fillStyle=di===ci?hexToRgba(palette.blue,0.90):'rgba(255,255,255,0.30)'; ctx.fill();
        }
      } else {
        const top=pad+138;
        const cardW=Math.min(360, (W - pad*2 - 24)/3);
        const cardH=Math.min(320, H*0.36);
        const gap=Math.max(12, (W - pad*2 - cardW*3)/2);

        for(let i=0;i<3;i++){
          const cx=pad + i*(cardW+gap);
          const cy=top;
          roundRect(cx,cy,cardW,cardH,18);
          ctx.fillStyle=hexToRgba(palette.blue, 0.06); ctx.fill();
          ctx.strokeStyle=hexToRgba(palette.blue, 0.22); ctx.lineWidth=1; ctx.stroke();

          const rec=items[i].img;
          if(rec.ready && rec.ok && rec.img){
            drawFitImage({x:cx, y:cy, w:cardW, h:cardH}, rec.img, 10, 18);
          } else {
            ctx.fillStyle='rgba(255,255,255,0.70)';
            ctx.font='600 14px Barlow, sans-serif';
            ctx.textAlign='left'; ctx.textBaseline='top';
            ctx.fillText('Loading…', cx+14, cy+14);
          }
        }
      }

      // Determine which slot is being hovered during drag
      const dragActive = ui.drag && ui.drag.type==='match';
      let hoveredSlot = null;
      let draggedLabel = null;
      if(dragActive){
        draggedLabel = match.draggables.find(x=>x.id===ui.drag.id);
        if(draggedLabel){
          for(const s of match.slots){
            if(s.kind !== draggedLabel.kind) continue;
            if(hitRect(s, ui.pointer.x, ui.pointer.y)){
              hoveredSlot = s;
              break;
            }
          }
        }
      }

      for(const s of match.slots){
        if(s.x < -1000) continue; // off-screen (mobile inactive cards)
        const isDropTarget = (hoveredSlot === s);
        roundRect(s.x,s.y,s.w,s.h,16);

        if(isDropTarget){
          // Highlighted drop zone
          ctx.fillStyle=hexToRgba(palette.blue, 0.18); ctx.fill();
          ctx.strokeStyle=hexToRgba(palette.blue, 0.55); ctx.lineWidth=2; ctx.stroke();
          ctx.lineWidth=1;
          // Pulsing inner glow
          roundRect(s.x+3,s.y+3,s.w-6,s.h-6,13);
          ctx.strokeStyle=hexToRgba(palette.blue, 0.20); ctx.stroke();
        } else {
          ctx.fillStyle=hexToRgba(palette.blue, 0.06); ctx.fill();
          ctx.strokeStyle=hexToRgba(palette.blue, 0.18); ctx.lineWidth=1; ctx.stroke();
        }

        ctx.fillStyle = isDropTarget ? hexToRgba(palette.blue, 0.85) : 'rgba(255,255,255,0.62)';
        ctx.font='800 12px Barlow, sans-serif';
        ctx.textAlign='left'; ctx.textBaseline='top';
        ctx.fillText(s.kind==='sci'?'Scientific name':'Family', s.x+12, s.y+10);

        if(s.holds){
          const d=match.draggables.find(x=>x.id===s.holds);
          if(d){
            ctx.fillStyle='rgba(255,255,255,0.92)';
            ctx.font='650 15px Barlow, sans-serif';
            const vLines = wrapText(d.text, s.w-24, ctx.font);
            let yy=s.y+26;
            for(const ln of vLines.slice(0,2)){
              ctx.fillText(ln, s.x+12, yy);
              yy+=18;
            }
          }
        } else {
          ctx.fillStyle = isDropTarget ? hexToRgba(palette.blue, 0.50) : 'rgba(255,255,255,0.30)';
          ctx.font='600 14px Barlow, sans-serif';
          ctx.textAlign='right'; ctx.textBaseline='middle';
          ctx.fillText(isDropTarget ? 'release to place' : 'drop here', s.x+s.w-12, s.y+s.h/2);
        }
      }

      // Draw non-dragged labels first (below), then the dragged one last (on top)
      for(const d0 of match.draggables){
        if(d0.placed) continue;
        if(dragActive && d0 === draggedLabel) continue; // draw later, on top

        const isHovered = !dragActive && hitRect(d0, ui.pointer.x, ui.pointer.y);
        roundRect(d0.x,d0.y,d0.w,d0.h,16);
        ctx.fillStyle = isHovered ? 'rgba(255,255,255,0.18)' : 'rgba(255,255,255,0.12)';
        ctx.fill();
        ctx.strokeStyle = isHovered ? hexToRgba(palette.blue, 0.35) : 'rgba(255,255,255,0.22)';
        ctx.lineWidth=1; ctx.stroke();
        ctx.fillStyle='rgba(255,255,255,0.94)';
        ctx.font='650 15px Barlow, sans-serif';
        ctx.textAlign='center'; ctx.textBaseline='middle';
        const vLines = wrapText(d0.text, d0.w-20, ctx.font);
        if(vLines.length===1) ctx.fillText(vLines[0], d0.x+d0.w/2, d0.y+d0.h/2);
        else {
          ctx.fillText(vLines[0], d0.x+d0.w/2, d0.y+d0.h/2-10);
          ctx.fillStyle='rgba(255,255,255,0.86)';
          ctx.font='650 14px Barlow, sans-serif';
          ctx.fillText(vLines[1], d0.x+d0.w/2, d0.y+d0.h/2+10);
        }
      }

      // Draw the actively dragged label on top with a "lifted" look
      if(dragActive && draggedLabel && !draggedLabel.placed){
        const d0 = draggedLabel;

        // Shadow underneath (offset down)
        roundRect(d0.x+2, d0.y+4, d0.w, d0.h, 16);
        ctx.fillStyle='rgba(0,0,0,0.30)'; ctx.fill();

        // Lifted card
        roundRect(d0.x, d0.y, d0.w, d0.h, 16);
        ctx.fillStyle=hexToRgba(palette.blue, 0.22); ctx.fill();
        ctx.strokeStyle=hexToRgba(palette.blue, 0.65); ctx.lineWidth=2; ctx.stroke();
        ctx.lineWidth=1;

        // Blue accent bar on left edge
        roundRect(d0.x, d0.y, 4, d0.h, 2);
        ctx.fillStyle=hexToRgba(palette.blue, 0.85); ctx.fill();

        // Text
        ctx.fillStyle='rgba(255,255,255,1)';
        ctx.font='700 15px Barlow, sans-serif';
        ctx.textAlign='center'; ctx.textBaseline='middle';
        const vLines = wrapText(d0.text, d0.w-20, ctx.font);
        if(vLines.length===1) ctx.fillText(vLines[0], d0.x+d0.w/2, d0.y+d0.h/2);
        else {
          ctx.fillText(vLines[0], d0.x+d0.w/2, d0.y+d0.h/2-10);
          ctx.fillStyle='rgba(255,255,255,0.92)';
          ctx.font='700 14px Barlow, sans-serif';
          ctx.fillText(vLines[1], d0.x+d0.w/2, d0.y+d0.h/2+10);
        }
      }
    }
