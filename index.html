const aliveCount = invaders.enemies.filter(e=>e && e.alive).length;

          ctx.fillStyle='rgba(255,255,255,0.82)';
          ctx.fillText(lines[li], cx, y0 + li*12);
        }
      }
    }
  }

      for(const b of invaders.bullets){

        ctx.font='700 14px Barlow, sans-serif';

        ctx.fillText('Hits: '+invaders.stats.hits+'  ·  Accuracy: '+acc+'%', _px+_pw/2, _py+72);

    function drawSnake(dt){
      drawSky(dt);
      clearButtons();

      const pad=Math.max(18, Math.min(44, W*0.05));
      drawTitle(pad, pad, 'Specimen Snake', 'collect specimens from your CSV • arrows or on-screen pad');
      drawTopBar(pad);

      addButton(pad+284, pad+86, 180, 44, 'Restart', ()=>{
        if(!state.csv.loaded) return toast('Load a CSV first.', 'warn', 1600);
        snake.reset(true);
      }, {fontSize:15, r:12, primary:true});
      addButton(pad+474, pad+86, 180, 44, (snake.voiceOn ? 'Voice: On' : 'Voice: Off'), ()=>{
        snake.voiceOn = !snake.voiceOn;
        state.settings.snakeVoice = snake.voiceOn;
        saveState();
        toast(snake.voiceOn ? 'Voice on' : 'Voice off', 'info', 900);
      }, {fontSize:15, r:12});

      const ar=gameAreaRect(pad);

      ctx.fillStyle='rgba(255,255,255,0.86)';
      ctx.font='700 16px Barlow, sans-serif';
      ctx.textAlign='left'; ctx.textBaseline='top';
      ctx.fillText('Score: '+snake.score+'   Best: '+state.lifetime.snake.best, pad, pad+126);
      // sidebar (target specimen)
      const now=performance.now();
      const showingCaptured = snake.flashSpec && (now < snake.flashUntil);
      const target = showingCaptured ? snake.flashSpec : snake.food;

      if(ar.sw > 0){
        const sx=ar.sx, sy=ar.sy, sw=ar.sw, sh=ar.h;
        const padS=12;

        roundRect(sx, sy, sw, sh, 18);
        ctx.fillStyle=hexToRgba(palette.orange, 0.06); ctx.fill();
        ctx.strokeStyle=hexToRgba(palette.orange, 0.18); ctx.lineWidth=1; ctx.stroke();

        ctx.fillStyle=hexToRgba(palette.orange, 0.90);
        ctx.font='900 12px Barlow, sans-serif';
        ctx.textAlign='left'; ctx.textBaseline='top';
        ctx.fillText(showingCaptured ? 'CAPTURED' : 'TARGET', sx+padS, sy+padS);

        if(target){
          const imgBox={x:sx+padS, y:sy+padS+26, w:sw-padS*2, h:Math.min(200, sh*0.48)};
          roundRect(imgBox.x,imgBox.y,imgBox.w,imgBox.h,14);
          ctx.fillStyle='rgba(0,0,0,0.22)'; ctx.fill();
          ctx.strokeStyle='rgba(255,255,255,0.10)'; ctx.stroke();

          if(target.img && target.img.ready && target.img.ok && target.img.img){
            drawFitImage(imgBox, target.img.img, 5, 14);
          } else {
            ctx.fillStyle='rgba(255,255,255,0.40)';
            ctx.font='700 12px Barlow, sans-serif';
            ctx.textAlign='center'; ctx.textBaseline='middle';
            ctx.fillText('loading…', imgBox.x+imgBox.w/2, imgBox.y+imgBox.h/2);
          }

          let ty=imgBox.y+imgBox.h+12;

          if(target.common){
            ctx.fillStyle='rgba(255,255,255,0.86)';
            ctx.font='800 14px Barlow, sans-serif';
            ctx.textAlign='left'; ctx.textBaseline='top';
            const cl=wrapText(target.common, sw-padS*2, ctx.font);
            for(const ln of cl.slice(0,2)){ ctx.fillText(ln, sx+padS, ty); ty+=18; }
            ty+=2;
          }

          ctx.fillStyle='rgba(255,255,255,0.78)';
          ctx.font='750 13px Barlow, sans-serif';
          ctx.textAlign='left'; ctx.textBaseline='top';
          const sl=wrapText(target.sci || '(unknown)', sw-padS*2, ctx.font);
          for(const ln of sl.slice(0,2)){ ctx.fillText(ln, sx+padS, ty); ty+=16; }

          ctx.fillStyle='rgba(255,255,255,0.62)';
          ctx.font='700 13px Barlow, sans-serif';
          const fl=wrapText('Family: '+(target.fam||'(no family)'), sw-padS*2, ctx.font);
          for(const ln of fl.slice(0,2)){ ctx.fillText(ln, sx+padS, ty); ty+=16; }

          const by=sy+sh-52;
          addButton(sx+padS, by, sw-padS*2, 40, 'Open record', ()=>{
            const u=target.recordUrl || target.url;
            try{ window.open(u, '_blank'); }catch(_){}
          }, {fontSize:14, r:12});
        } else {
          ctx.fillStyle='rgba(255,255,255,0.55)';
          ctx.font='700 14px Barlow, sans-serif';
          ctx.textAlign='left'; ctx.textBaseline='top';
          ctx.fillText('No target yet.', sx+padS, sy+padS+30);
        }
      } // end if(ar.sw > 0)

      // Mobile info overlay: target / captured specimen
      drawMobileInfoOverlay((sheetY, sheetH)=>{
        const mx=16, mw=W-32;
        ctx.fillStyle=hexToRgba(palette.orange, 0.85);
        ctx.font='800 12px Barlow, sans-serif';
        ctx.textAlign='left'; ctx.textBaseline='top';
        ctx.fillText(showingCaptured ? 'CAPTURED' : 'TARGET SPECIMEN', mx, sheetY+16);
        if(target){
          const imgBox={x:mx, y:sheetY+40, w:mw*0.38, h:Math.min(120, sheetH*0.35)};
          roundRect(imgBox.x,imgBox.y,imgBox.w,imgBox.h,10);
          ctx.fillStyle='rgba(0,0,0,0.22)'; ctx.fill();
          if(target.img && target.img.ready && target.img.ok && target.img.img) drawFitImage(imgBox, target.img.img, 4, 10);
          const tx=imgBox.x+imgBox.w+12;
          let ty=sheetY+42;
          if(target.common){ ctx.fillStyle='rgba(255,255,255,0.90)'; ctx.font='800 15px Barlow, sans-serif';
            const cl=wrapText(target.common, mw-imgBox.w-16, ctx.font);
            for(const ln of cl.slice(0,2)){ ctx.fillText(ln, tx, ty); ty+=20; }
          }
          ctx.fillStyle='rgba(255,255,255,0.72)'; ctx.font='700 13px Barlow, sans-serif';
          const sl=wrapText(target.sci||'(unknown)', mw-imgBox.w-16, ctx.font);
          for(const ln of sl.slice(0,2)){ ctx.fillText(ln, tx, ty); ty+=16; }
          ctx.fillStyle='rgba(255,255,255,0.55)'; ctx.font='700 12px Barlow, sans-serif';
          const fl=wrapText('Family: '+(target.fam||'(no family)'), mw-imgBox.w-16, ctx.font);
          for(const ln of fl.slice(0,2)){ ctx.fillText(ln, tx, ty); ty+=15; }
        } else {

          ctx.fillText('No target yet.', mx, sheetY+48);

      });

      if(!paused && snake.alive) snake.update(dt);

      roundRect(ar.x, ar.y, ar.w, ar.h, 22);
      ctx.fillStyle='rgba(0,0,0,0.10)'; ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,0.10)'; ctx.stroke();

      const cell=snake.cell;
      const gx=ar.x, gy=ar.y;

      // FOOD
      if(snake.food){
        const fx=gx + snake.food.x*cell + cell/2;
        const fy=gy + snake.food.y*cell + cell/2;
        const r=cell*0.78; // target specimen size

        ctx.beginPath(); ctx.arc(fx,fy,r,0,Math.PI*2);
        ctx.fillStyle='rgba(255,255,255,0.09)'; ctx.fill();
        ctx.strokeStyle='rgba(255,255,255,0.20)'; ctx.stroke();

        if(snake.food.img && snake.food.img.ready && snake.food.img.ok && snake.food.img.img){
          drawCircleImageCover(snake.food.img.img, fx, fy, r*0.92, 0.98);
        }

        if(snake.food.isForbidden){
          ctx.beginPath(); ctx.arc(fx,fy,r*1.05,0,Math.PI*2);
          ctx.strokeStyle='rgba(255,60,60,0.92)'; ctx.lineWidth=4; ctx.stroke(); ctx.lineWidth=1;
        }
      }

      // snake
      for(let i=snake.body.length-1;i>=0;i--){
        const p=snake.body[i];
        const px=gx + p.x*cell;
        const py=gy + p.y*cell;
        const isHead = (i===0);
        roundRect(px+1, py+1, cell-2, cell-2, 10);
        ctx.fillStyle = isHead ? 'rgba(255,255,255,0.22)' : 'rgba(255,255,255,0.14)';
        ctx.fill();
        ctx.strokeStyle='rgba(255,255,255,'+(isHead?0.28:0.18)+')';
        ctx.stroke();

        if(isHead){
          ctx.beginPath();
          ctx.arc(px+cell*0.66, py+cell*0.38, 2.2, 0, Math.PI*2);
          ctx.fillStyle='rgba(255,255,255,0.62)';
          ctx.fill();
        }
      }

      // capture flash: brief centred overlay when a specimen is eaten
      if(snake.flashSpec && performance.now() < snake.flashUntil){
        const _now=performance.now();
        const _age=1200-(snake.flashUntil-_now);
        const _fa=Math.sin(_age/1200*Math.PI);
        const _spec=snake.flashSpec;
        const _cr=Math.min(ar.w,ar.h)*0.26;
        const _cx=ar.x+ar.w/2, _cy=ar.y+ar.h/2-10;

        ctx.globalAlpha=_fa*0.38;
        ctx.beginPath(); ctx.arc(_cx,_cy,_cr*1.5,0,Math.PI*2);
        ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fill();
        ctx.globalAlpha=1;

        if(_spec.img && _spec.img.ready && _spec.img.ok && _spec.img.img){
          const _d=Math.round(_cr*2);
          const _cached=getCircleImage(_spec.img.img, _d);
          if(_cached){ ctx.globalAlpha=_fa; ctx.drawImage(_cached,_cx-_cr,_cy-_cr,_d,_d); ctx.globalAlpha=1; }
        }

        ctx.globalAlpha=_fa*0.75;
        ctx.beginPath(); ctx.arc(_cx,_cy,_cr,0,Math.PI*2);
        ctx.strokeStyle=hexToRgba(palette.orange,0.95); ctx.lineWidth=3; ctx.stroke(); ctx.lineWidth=1;
        ctx.globalAlpha=1;

        const _name=_spec.common||_spec.sci||'';
        if(_name){
          ctx.globalAlpha=_fa;
          ctx.fillStyle='rgba(255,255,255,0.94)';
          ctx.font='900 15px Barlow, sans-serif';
          ctx.textAlign='center'; ctx.textBaseline='top';
          ctx.fillText(_name.length>32?_name.slice(0,29)+'…':_name, _cx, _cy+_cr+8);
          ctx.globalAlpha=1;
        }
      }

      // D-pad — positioned below the game area
      const dpadS = isMobile() ? 48 : 42, dpadG = 6;
      const dpadW = dpadS*3 + dpadG*2;
      const dpadBx = ar.x + (ar.w - dpadW)/2;  // centered under the game
      const dpadBy = ar.y + ar.h + 14;

      const upB    = {x:dpadBx+dpadS+dpadG, y:dpadBy,                w:dpadS, h:dpadS, dir:'up'};
      const leftB  = {x:dpadBx,             y:dpadBy+dpadS+dpadG,    w:dpadS, h:dpadS, dir:'left'};
      const rightB = {x:dpadBx+(dpadS+dpadG)*2, y:dpadBy+dpadS+dpadG, w:dpadS, h:dpadS, dir:'right'};
      const downB  = {x:dpadBx+dpadS+dpadG, y:dpadBy+(dpadS+dpadG)*2, w:dpadS, h:dpadS, dir:'down'};
      for(const b of [upB,leftB,rightB,downB]){
        roundRect(b.x,b.y,b.w,b.h,11);
        ctx.fillStyle=hexToRgba(palette.orange, 0.08); ctx.fill();
        ctx.strokeStyle=hexToRgba(palette.orange, 0.22); ctx.lineWidth=1; ctx.stroke();
        drawArrowTri(b.x+b.w/2, b.y+b.h/2, b.dir, dpadS*0.26, 'rgba(255,255,255,0.78)');
        addButton(b.x, b.y, b.w, b.h, '', (()=>{
          const d=b.dir;
          return ()=>{
            if(d==='up') snake.setDir(0,-1);
            else if(d==='down') snake.setDir(0,1);
            else if(d==='left') snake.setDir(-1,0);
            else if(d==='right') snake.setDir(1,0);
          };
        })(), {ghost:true});
      }

      ctx.fillStyle='rgba(255,255,255,0.54)';
      ctx.font='600 13px Barlow, sans-serif';
      ctx.textAlign='left'; ctx.textBaseline='bottom';

      if(!snake.alive){
        ctx.fillStyle='rgba(255,255,255,0.88)';
        ctx.font='900 22px Barlow, sans-serif';
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText('Game over', ar.x+ar.w/2, ar.y+ar.h/2);
      }
    }

    function drawNight(dt){
      drawSky(dt);
      clearButtons();

      const pad=Math.max(18, Math.min(44, W*0.05));
      const st=night.sessionStats();
      const subtitle = night.currentDate() + '  ·  ' + st.records + ' records  ·  ' + st.species + ' species  ·  ' + st.families + ' families';
      drawTitle(pad, pad, 'Night Walk', subtitle);
      drawTopBar(pad);

      const ar=gameAreaRect(pad);

      // top controls (date + family filtering)
      const ctrlY = pad+86, h = 44, gap = 8;
      if(isMobile()){
        // Mobile: ◀ Date ▶ Auto only (one compact row)
        const wArrow2=44, wAuto2=110;
        const wDate2 = W - pad*2 - wArrow2*2 - wAuto2 - gap*3;
        let x2=pad;
        addButton(x2, ctrlY, wArrow2, h, '◀', ()=>night.prevDate(), {fontSize:16, r:12}); x2+=wArrow2+gap;
        addButton(x2, ctrlY, wDate2, h, ('Date: ' + night.currentDate() + ' ▾'), ()=>night.toggleDatePicker(), {fontSize:14, r:12, primary: night.datePicker}); x2+=wDate2+gap;
        addButton(x2, ctrlY, wArrow2, h, '▶', ()=>night.nextDate(), {fontSize:16, r:12}); x2+=wArrow2+gap;
        addButton(x2, ctrlY, wAuto2, h, night.autoplay?'Auto: on':'Auto: off', ()=>night.toggleAuto(), {fontSize:14, r:12, primary: night.autoplay});
      } else {
        const ctrlX = pad+284;
        const avail = Math.max(320, (W - pad) - ctrlX);

        const wArrow = 40, wAuto = 130, wReset = 88, wSwarm = 88;
        const fixed = (wArrow*2 + wAuto + wReset + wSwarm + gap*6);
        let rem = Math.max(160, avail - fixed);

        let wFam = 0;
        let wDate = rem;
        if(data.keys.family){
          wFam = clamp(rem*0.46, 130, 220);
          wDate = clamp(rem - wFam, 150, 260);
          const excess = (wDate + wFam) - rem;
          if(excess > 0){ wDate -= excess*0.55; wFam -= excess*0.45; }
        } else {
          wDate = clamp(rem, 170, 320);
        }

        let x = ctrlX;
        addButton(x, ctrlY, wArrow, h, '◀', ()=>night.prevDate(), {fontSize:16, r:12}); x += wArrow + gap;
        addButton(x, ctrlY, wDate, h, ('Date: ' + night.currentDate() + ' ▾'), ()=>night.toggleDatePicker(), {fontSize:14, r:12, primary: night.datePicker}); x += wDate + gap;
        addButton(x, ctrlY, wArrow, h, '▶', ()=>night.nextDate(), {fontSize:16, r:12}); x += wArrow + gap;

        if(data.keys.family){
          const famLabel = night.familyFilter==='All' ? 'All families' : night.familyFilter;
          addButton(x, ctrlY, wFam, h, ('Family: ' + famLabel + ' ▾'), ()=>night.toggleFamilyPicker(), {fontSize:14, r:12, primary: night.familyPicker}); x += wFam + gap;
        } else {
          addButton(x, ctrlY, 170, h, 'Family: n/a', ()=>toast('No family column found in CSV.', 'info', 1200), {fontSize:14, r:12}); x += 170 + gap;
        }

        addButton(x, ctrlY, wAuto, h, night.autoplay?'Auto: on':'Auto: off', ()=>night.toggleAuto(), {fontSize:14, r:12, primary: night.autoplay}); x += wAuto + gap;
        addButton(x, ctrlY, wReset, h, 'Reset', ()=>night.loadDate(night.currentDate()), {fontSize:14, r:12}); x += wReset + gap;
        addButton(x, ctrlY, wSwarm, h, 'Swarm', ()=>night.swarm(), {fontSize:14, r:12});
      }

      if(!state.csv.loaded){
        ctx.fillStyle='rgba(255,255,255,0.78)';
        ctx.font='600 16px Barlow, sans-serif';
        ctx.textAlign='left'; ctx.textBaseline='top';
        ctx.fillText('Load a CSV first.', pad, pad+140);
        return;
      }
      if(!data.nightDates.length){
        ctx.fillStyle='rgba(255,255,255,0.78)';
        ctx.font='600 16px Barlow, sans-serif';
        ctx.textAlign='left'; ctx.textBaseline='top';
        ctx.fillText('No date column found for Night Walk.', pad, pad+140);
        return;
      }

      // left "sheet"
      const sheet={x:ar.x+22, y:ar.y+22, w:ar.w-44, h:ar.h-44};
      roundRect(sheet.x, sheet.y, sheet.w, sheet.h, 26);
      ctx.fillStyle=hexToRgba(palette.purple, 0.05); ctx.fill();
      ctx.strokeStyle=hexToRgba(palette.purple, 0.16); ctx.lineWidth=1; ctx.stroke();

      // subtle inner "sheet glow"
      const glow=ctx.createRadialGradient(sheet.x+sheet.w*0.5, sheet.y+sheet.h*0.30, sheet.w*0.1, sheet.x+sheet.w*0.5, sheet.y+sheet.h*0.30, sheet.w*0.9);
      glow.addColorStop(0,hexToRgba(palette.purple, 0.06));
      glow.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=glow;
      ctx.fillRect(sheet.x, sheet.y, sheet.w, sheet.h);

      // If filtered to zero, gently explain
      if(night.familyFilter!=='All' && st.records===0){
        ctx.fillStyle='rgba(255,255,255,0.74)';
        ctx.font='500 13px Barlow, sans-serif';
        ctx.textAlign='left'; ctx.textBaseline='top';
        ctx.fillText('No records for that family on this date — change the Family filter.', pad, pad+166);
      }

      // update
      if(!paused) night.update(dt, sheet);

      // pre-compute family sort + hover family (used by sprite ring and sidebar)
      const _famRowH=26, _famRowGap=3, _famRowStep=29;
      const _sortedFams=[...night.seenFamilies].sort((a,b)=>b.count-a.count);
      const _visRows=Math.max(2, Math.floor(ar.h*0.36 / _famRowStep));
      const _clampedScrollRow=clamp(night._famLegendScrollRow||0, 0, Math.max(0, _sortedFams.length-_visRows));
      night._famLegendScrollRow=_clampedScrollRow;
      const _famListTop=ar.sy+26, _famListBottom=_famListTop+_visRows*_famRowStep;
      let _hoverFam=null;
      if(!night.datePicker && !night.familyPicker
         && ui.pointer.x>=ar.sx && ui.pointer.x<=ar.sx+ar.sw
         && ui.pointer.y>=_famListTop && ui.pointer.y<_famListBottom){
        const _hRow=Math.floor((ui.pointer.y-_famListTop)/_famRowStep);
        const _absRow=_hRow+_clampedScrollRow;
        if(_absRow>=0 && _absRow<_sortedFams.length) _hoverFam=_sortedFams[_absRow].fam;
      }

      // draw arrivals
      for(const sp of night.sprites){
        const r = 34*sp.s;
        const _dim = (_hoverFam && sp.fam!==_hoverFam && night.selected!==sp) ? 0.22 : 1.0;
        const shadow = 0.22*sp.a*_dim;
        ctx.beginPath(); ctx.arc(sp.x, sp.y+4, r*0.95, 0, Math.PI*2);
        ctx.fillStyle='rgba(0,0,0,'+shadow+')'; ctx.fill();

        ctx.beginPath(); ctx.arc(sp.x, sp.y, r, 0, Math.PI*2);
        ctx.fillStyle='rgba(255,255,255,'+(0.08*sp.a*_dim)+')'; ctx.fill();
        ctx.strokeStyle='rgba(255,255,255,'+(0.16*sp.a*_dim)+')'; ctx.stroke();

        if(sp.img && sp.img.ready && sp.img.ok && sp.img.img){
          const d = Math.round(r*2*0.92);
          const cached = getCircleImage(sp.img.img, d);
          if(cached){
            ctx.globalAlpha = 0.98*sp.a*_dim;
            ctx.drawImage(cached, sp.x - d/2, sp.y - d/2, d, d);
            ctx.globalAlpha = 1;
          }
        } else {
          ctx.fillStyle='rgba(255,255,255,'+(0.40*_dim)+')';
          ctx.font='700 12px Barlow, sans-serif';
          ctx.textAlign='center'; ctx.textBaseline='middle';
          ctx.fillText('…', sp.x, sp.y);
        }

        // family colour ring — persistent, distinct colour per family
        if(sp.a > 0.25){
          const _fCol = night.getFamilyColor(sp.fam);
          ctx.beginPath(); ctx.arc(sp.x, sp.y, r*1.07, 0, Math.PI*2);
          ctx.strokeStyle=hexToRgba(_fCol, 0.44*sp.a*_dim); ctx.lineWidth=2; ctx.stroke(); ctx.lineWidth=1;
        }
        // selected: brighter family ring + thin white outer ring
        if(night.selected===sp){
          const _fCol = night.getFamilyColor(sp.fam);
          ctx.beginPath(); ctx.arc(sp.x, sp.y, r*1.07, 0, Math.PI*2);
          ctx.strokeStyle=hexToRgba(_fCol, 0.92); ctx.lineWidth=3; ctx.stroke(); ctx.lineWidth=1;
          ctx.beginPath(); ctx.arc(sp.x, sp.y, r*1.18, 0, Math.PI*2);
          ctx.strokeStyle='rgba(255,255,255,0.68)'; ctx.lineWidth=1.5; ctx.stroke(); ctx.lineWidth=1;
        }
        // hover family highlight: sidebar hover lights up matching sprites
        if(_hoverFam && sp.fam===_hoverFam && night.selected!==sp && sp.a>0.25){
          ctx.beginPath(); ctx.arc(sp.x, sp.y, r*1.22, 0, Math.PI*2);
          ctx.strokeStyle='rgba(255,255,255,0.72)'; ctx.lineWidth=2; ctx.stroke(); ctx.lineWidth=1;
        }
      }

      // hover tooltip (settled sprites only)
      {
        const _hov = night.hitTest(ui.pointer.x, ui.pointer.y);
        if(_hov && _hov.settled){
          const _label = _hov.common || _hov.sci;
          const _short = _label.length>44 ? _label.slice(0,41)+'…' : _label;
          ctx.font='700 12px Barlow, sans-serif';
          const _tw = ctx.measureText(_short).width;
          const _tp=8, _tr=7;
          const _tx = clamp(_hov.x - _tw/2 - _tp, sheet.x+6, sheet.x+sheet.w-_tw-_tp*2-6);
          const _ty = _hov.y - 34*_hov.s - 34;
          roundRect(_tx, _ty, _tw+_tp*2, 24, _tr);
          ctx.fillStyle='rgba(18,8,28,0.82)'; ctx.fill();
          ctx.strokeStyle=hexToRgba(palette.purple,0.38); ctx.lineWidth=1; ctx.stroke();
          ctx.fillStyle='rgba(255,255,255,0.92)';
          ctx.textAlign='left'; ctx.textBaseline='middle';
          ctx.fillText(_short, _tx+_tp, _ty+12);
        }
      }

      const sel = night.card;

      if(ar.sw > 0){
      // right sidebar: family legend + selected detail
      const sx=ar.sx, sy=ar.sy, sw=ar.sw, sh=ar.h;
      roundRect(sx, sy, sw, sh, 22);
      ctx.fillStyle=hexToRgba(palette.purple, 0.06); ctx.fill();
      ctx.strokeStyle=hexToRgba(palette.purple, 0.16); ctx.lineWidth=1; ctx.stroke();

      // Family legend header
      ctx.fillStyle=hexToRgba(palette.purple, 0.88);
      ctx.font='800 11px Barlow, sans-serif';
      ctx.textAlign='left'; ctx.textBaseline='top';
      const _famTitle = night.seenFamilies.length
        ? 'FAMILIES (' + night.seenFamilies.length + ')  ·  ' + night.sprites.length + ' / ' + night.session.length + ' arrived'
        : 'FAMILIES  ·  ' + night.sprites.length + ' / ' + night.session.length + ' arrived';
      ctx.fillText(_famTitle, sx+12, sy+10);

      let _fy = sy+26;

      // handle wheel scroll over family list
      if(ui.wheel && !night.datePicker && !night.familyPicker
         && ui.pointer.x>=sx && ui.pointer.x<=sx+sw
         && ui.pointer.y>=_famListTop && ui.pointer.y<_famListBottom){
        night._famLegendScrollRow=clamp(_clampedScrollRow+Math.sign(ui.wheel), 0, Math.max(0, _sortedFams.length-_visRows));
      }

      if(_sortedFams.length===0){
        ctx.fillStyle='rgba(255,255,255,0.30)';
        ctx.font='500 11px Barlow, sans-serif';
        ctx.textAlign='left'; ctx.textBaseline='top';
        ctx.fillText('Families appear as arrivals land.', sx+14, _fy+2);
        _fy += 18;
      } else {
        const _displayFams=_sortedFams.slice(_clampedScrollRow, _clampedScrollRow+_visRows);
        for(let _fi=0; _fi<_displayFams.length; _fi++){
          const _sf2=_displayFams[_fi];
          const _isHov=_hoverFam===_sf2.fam;
          const _isActive=night.browseFam===_sf2.fam;
          const _lit=_isHov||_isActive;

          roundRect(sx+12, _fy, sw-24, _famRowH, 8);
          ctx.fillStyle=_isActive ? hexToRgba(_sf2.color, 0.28) : (_isHov ? hexToRgba(_sf2.color, 0.18) : 'rgba(255,255,255,0.05)'); ctx.fill();
          ctx.strokeStyle=_lit ? hexToRgba(_sf2.color, _isActive?0.85:0.60) : 'rgba(255,255,255,0.10)'; ctx.lineWidth=_isActive?1.5:1; ctx.stroke(); ctx.lineWidth=1;

          ctx.beginPath(); ctx.arc(sx+21, _fy+_famRowH/2, 4, 0, Math.PI*2);
          ctx.fillStyle=_sf2.color; ctx.fill();

          const _flabel=_sf2.fam.length>20 ? _sf2.fam.slice(0,18)+'…' : _sf2.fam;
          ctx.fillStyle=_lit ? 'rgba(255,255,255,0.98)' : 'rgba(255,255,255,0.78)';
          ctx.font=(_isActive?'700 ':'600 ')+'11px Barlow, sans-serif';
          ctx.textAlign='left'; ctx.textBaseline='middle';
          ctx.fillText(_flabel, sx+30, _fy+_famRowH/2);

          const _cntStr=String(_sf2.count);
          ctx.font='700 10px Barlow, sans-serif';
          const _cntW=ctx.measureText(_cntStr).width+8;
          roundRect(sx+sw-12-_cntW, _fy+4, _cntW, _famRowH-8, 5);
          ctx.fillStyle=hexToRgba(_sf2.color, _lit ? 0.56 : 0.36); ctx.fill();
          ctx.fillStyle='rgba(255,255,255,0.88)';
          ctx.textAlign='center'; ctx.textBaseline='middle';
          ctx.fillText(_cntStr, sx+sw-12-_cntW/2, _fy+_famRowH/2);

          // clickable: browse this family's members in the card below
          addButton(sx+12, _fy, sw-24, _famRowH, '', ((f)=>()=>night.selectFamily(f))(_sf2.fam), {ghost:true});

          _fy += _famRowStep;
        }
        // scrollbar when there are more families than fit
        if(_sortedFams.length>_visRows){
          const _sbH=_visRows*_famRowStep;
          const _thumbH=Math.max(18, _sbH*(_visRows/_sortedFams.length));
          const _thumbTop=_famListTop+(_clampedScrollRow/Math.max(1,_sortedFams.length-_visRows))*(_sbH-_thumbH);
          roundRect(sx+sw-8, _famListTop, 3, _sbH, 2);
          ctx.fillStyle='rgba(255,255,255,0.08)'; ctx.fill();
          roundRect(sx+sw-8, _thumbTop, 3, _thumbH, 2);
          ctx.fillStyle='rgba(255,255,255,0.36)'; ctx.fill();
        }
      }

      // Divider
      const _divY = _fy + 5;
      ctx.beginPath(); ctx.moveTo(sx+14,_divY); ctx.lineTo(sx+sw-14,_divY);
      ctx.strokeStyle='rgba(255,255,255,0.10)'; ctx.lineWidth=1; ctx.stroke();

      // Selected panel
      const panelY = _divY + 8;
      const panelH = Math.max(100, sh - (panelY-sy) - 8);
      roundRect(sx+12, panelY, sw-24, panelH, 16);
      ctx.fillStyle='rgba(0,0,0,0.22)'; ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,0.08)'; ctx.stroke();

      if(sel){
        const _imgH = Math.min(132, Math.floor(panelH*0.36));
        const imgBox={x:sx+18, y:panelY+10, w:sw-36, h:_imgH};
        roundRect(imgBox.x,imgBox.y,imgBox.w,imgBox.h,10);
        ctx.fillStyle='rgba(255,255,255,0.06)'; ctx.fill();
        ctx.strokeStyle='rgba(255,255,255,0.10)'; ctx.stroke();
        if(sel.img && sel.img.ready && sel.img.ok && sel.img.img){
          drawFitImage(imgBox, sel.img.img, 4, 10);
        } else {
          ctx.fillStyle='rgba(255,255,255,0.36)';
          ctx.font='600 11px Barlow, sans-serif';
          ctx.textAlign='center'; ctx.textBaseline='middle';
          ctx.fillText('loading…', imgBox.x+imgBox.w/2, imgBox.y+imgBox.h/2);
        }

        const _txW = sw-44;
        const _famColor = night.getFamilyColor(sel.fam);
        let _ety = imgBox.y+imgBox.h+9;
        ctx.textAlign='left'; ctx.textBaseline='top';

        // common name — primary headline
        if(sel.common){
          ctx.fillStyle='rgba(255,255,255,0.95)';
          ctx.font='900 14px Barlow, sans-serif';
          const _cnL=wrapText(sel.common, _txW, ctx.font);
          for(const ln of _cnL.slice(0,2)){ ctx.fillText(ln, sx+22, _ety); _ety+=17; }
        }

        // scientific name italic
        ctx.fillStyle='rgba(255,255,255,0.55)';
        ctx.font='italic 600 11px Barlow, sans-serif';
        const _snL=wrapText(sel.sci, _txW, ctx.font);
        for(const ln of _snL.slice(0,1)){ ctx.fillText(ln, sx+22, _ety); _ety+=14; }

        // record count in whole set + time observed, combined on one line
        const _rec=night.speciesRecord(sel);
        const _tObs=night.formatObservedTime(sel);
        let _info='';
        if(_rec) _info = '#'+_rec.pos+' of '+_rec.total+' record'+(_rec.total===1?'':'s');
        if(_tObs) _info += (_info?'  ·  ':'') + _tObs;
        if(_info){
          ctx.fillStyle=hexToRgba(palette.purple,0.92);
          ctx.font='700 11px Barlow, sans-serif';
          ctx.fillText(_info, sx+22, _ety);
          _ety+=17;
        }

        // taxonomy block — every available rank, Family tinted to its legend colour
        const _navY=panelY+panelH-74;
        const _taxBottom=_navY-8;
        const _tax=getTaxonomy(sel.idx);
        if(_tax.length && _ety < _taxBottom-12){
          ctx.fillStyle=hexToRgba(palette.purple,0.62);
          ctx.font='800 9px Barlow, sans-serif';
          ctx.fillText('TAXONOMY', sx+22, _ety); _ety+=13;
          const _valX=sx+22+62;
          const _maxValW=(sx+sw-20)-_valX;
          for(const t of _tax){
            if(_ety > _taxBottom-11){
              ctx.fillStyle='rgba(255,255,255,0.40)';
              ctx.font='600 9px Barlow, sans-serif';
              ctx.fillText('+'+(_tax.length-_tax.indexOf(t))+' more…', sx+22, _ety);
              _ety+=12; break;
            }
            const _isFam=(t.col==='taxon_family_name');
            ctx.fillStyle='rgba(255,255,255,0.38)';
            ctx.font='600 10px Barlow, sans-serif';
            ctx.textAlign='left'; ctx.textBaseline='top';
            ctx.fillText(t.rank, sx+22, _ety);
            let _val=t.name;
            ctx.font=(_isFam?'800 ':'600 ')+'10px Barlow, sans-serif';
            while(_val.length>3 && ctx.measureText(_val).width>_maxValW) _val=_val.slice(0,-2);
            if(_val!==t.name) _val=_val.replace(/…?$/,'…');
            ctx.fillStyle=_isFam ? _famColor : 'rgba(255,255,255,0.84)';
            ctx.fillText(_val, _valX, _ety);
            _ety+=13;
          }
        }

        // navigation: ◀ [N / total] ▶  (walks cardList — all arrivals, or one family)
        if(night.cardList.length > 1){
          const _nBH=26, _nBW=30, _nY=_navY;
          addButton(sx+18, _nY, _nBW, _nBH, '◀', ()=>night.modalPrev(), {fontSize:12, r:7});
          addButton(sx+sw-18-_nBW, _nY, _nBW, _nBH, '▶', ()=>night.modalNext(), {fontSize:12, r:7});
          ctx.fillStyle='rgba(255,255,255,0.55)';
          ctx.font='700 11px Barlow, sans-serif';
          ctx.textAlign='center'; ctx.textBaseline='middle';
          const _nc = (night.cardPos+1)+' / '+night.cardList.length;
          ctx.fillText(_nc, sx+sw/2, _nY+_nBH/2-6);
          if(night.browseFam){
            ctx.fillStyle=hexToRgba(_famColor,0.95);
            ctx.font='600 9px Barlow, sans-serif';
            const _bf=night.browseFam.length>22?night.browseFam.slice(0,20)+'…':night.browseFam;
            ctx.fillText(_bf, sx+sw/2, _nY+_nBH/2+7);
          }
        }

        addButton(sx+18, panelY+panelH-44, sw-36, 34, 'Open observation', ()=>{
          const u=sel.recordUrl||sel.url;
          if(u){ try{ window.open(u,'_blank'); }catch(_){} }
          else toast('No URL column found.', 'warn', 1500);
        }, {fontSize:12, r:9, primary:true});
      } else {
        ctx.fillStyle='rgba(255,255,255,0.38)';
        ctx.font='500 12px Barlow, sans-serif';
        ctx.textAlign='left'; ctx.textBaseline='top';
        ctx.fillText('Tap an arrival, or pick a family above.', sx+20, panelY+14);
      }
      } // end if(ar.sw > 0)

      // Mobile info overlay: selected specimen
      drawMobileInfoOverlay((sheetY, sheetH)=>{
        const mx=16, mw=W-32;
        ctx.fillStyle=hexToRgba(palette.purple, 0.85);
        ctx.font='800 12px Barlow, sans-serif';
        ctx.textAlign='left'; ctx.textBaseline='top';
        ctx.fillText('SELECTED', mx, sheetY+16);
        if(sel){
          const imgBox={x:mx, y:sheetY+40, w:mw*0.38, h:Math.min(120, sheetH*0.35)};
          roundRect(imgBox.x,imgBox.y,imgBox.w,imgBox.h,10);
          ctx.fillStyle='rgba(0,0,0,0.22)'; ctx.fill();
          if(sel.img && sel.img.ready && sel.img.ok && sel.img.img) drawFitImage(imgBox, sel.img.img, 4, 10);
          const tx=imgBox.x+imgBox.w+12;
          let ty=sheetY+42;
          if(sel.common){ ctx.fillStyle='rgba(255,255,255,0.92)'; ctx.font='800 15px Barlow, sans-serif';
            const cl=wrapText(sel.common, mw-imgBox.w-16, ctx.font);
            for(const ln of cl.slice(0,2)){ ctx.fillText(ln, tx, ty); ty+=20; }
          }
          ctx.fillStyle='rgba(255,255,255,0.68)'; ctx.font='600 12px Barlow, sans-serif';
          ctx.textAlign='left'; ctx.textBaseline='top';
          const sl2=wrapText(sel.sci||'(unknown)', mw-imgBox.w-16, ctx.font);
          for(const ln of sl2.slice(0,1)){ ctx.fillText(ln, tx, ty); ty+=16; }
          const _mrec=night.speciesRecord(sel);
          if(_mrec){ ctx.fillStyle=hexToRgba(palette.purple,0.92); ctx.font='700 11px Barlow, sans-serif';
            ctx.fillText('#'+_mrec.pos+' of '+_mrec.total+' records', tx, ty); ty+=16;
          }
          // taxonomy under the image, full sheet width, Family tinted
          let my=imgBox.y+imgBox.h+10;
          const _mtax=getTaxonomy(sel.idx);
          const _mFamColor=night.getFamilyColor(sel.fam);
          for(const t of _mtax){
            if(my > sheetY+sheetH-16) break;
            const _isFam=(t.col==='taxon_family_name');
            ctx.fillStyle='rgba(255,255,255,0.40)'; ctx.font='600 10px Barlow, sans-serif';
            ctx.fillText(t.rank, mx, my);
            ctx.fillStyle=_isFam?_mFamColor:'rgba(255,255,255,0.82)';
            ctx.font=(_isFam?'800 ':'600 ')+'10px Barlow, sans-serif';
            ctx.fillText(t.name, mx+66, my);
            my+=13;
          }
        } else {
          ctx.fillStyle='rgba(255,255,255,0.52)'; ctx.font='600 13px Barlow, sans-serif';
          ctx.fillText('Tap an arrival to explore.', mx, sheetY+48);
        }
      });

      // picker overlays drawn last so they render on top of sprites and sidebar
      if(night.datePicker){
        const list = data.nightDates;
        drawScrollPicker({
          list,
          modalW:      clamp(W * 0.36, 300, 440),
          scrollOwner: night, scrollKey: '_dateScrollPx',
          onClose:     ()=>{ night.datePicker=false; },
          title:       'Pick a Date',
          countLabel:  list.length + ' dates',
          accent:      palette.purple,
          isCurrent:   (d, idx) => idx === night.dateIndex,
          getLabel:    (d)      => d,
          getCount:    (d)      => ((data.nightMap && data.nightMap[d]) ? data.nightMap[d].length : 0) + ' rec',
          onSelect:    (d, idx) => night.setDateIndex(idx)
        });
      }
      if(night.familyPicker && data.keys.family){
        const fams = ['All'].concat(night.familiesForDate(night.currentDate()));
        drawScrollPicker({
          list:        fams,
          modalW:      clamp(W * 0.36, 300, 440),
          scrollOwner: night, scrollKey: '_famScrollPx',
          onClose:     ()=>{ night.familyPicker=false; },
          title:       'Filter by Family',
          countLabel:  fams.length + ' families',
          accent:      palette.purple,
          isCurrent:   (f) => (night.familyFilter==='All' && f==='All') || night.familyFilter===f,
          getLabel:    (f) => f === 'All' ? 'All families' : f,
          getCount:    null,
          onSelect:    (f) => night.setFamilyFilter(f==='All'?'All':f)
        });
      }
    }



    // ---------- Main loop ----------
    let lastT=performance.now();
    function frame(t){
      const rawDt=Math.min(0.033, (t-lastT)/1000);
      lastT=t;

      // auto-return to home after 5 min idle (kiosk/exhibition mode)
      if(scene!=='home' && t - lastInteraction > IDLE_MS){
        goto('home');
        lastInteraction = t;
      }

      if(scene==='home') drawHome(rawDt);
      else if(scene==='quiz') drawQuiz(rawDt);
      else if(scene==='match') drawMatch(rawDt);
      else if(scene==='invaders') drawInvaders(rawDt);
      else if(scene==='snake') drawSnake(rawDt);
      else if(scene==='night') drawNight(rawDt);
      else drawHome(rawDt);

      // Help overlay (clears buttons when active, draws its own)
      if(showHelp && scene !== 'home'){
        clearButtons();
        drawHelpModal();
      }

      for(const b of ui.buttons) drawButton(b);

      if(ui.pointer.clicked){
        const px=ui.pointer.x, py=ui.pointer.y;
        for(let i=ui.buttons.length-1;i>=0;i--){
          const b=ui.buttons[i];
          if(hitBtn(b,px,py)){
            try{ b.fn(); }catch(err){ toast('Action failed: '+safeStr(err), 'warn', 2200); }
            break;
          }
        }
        ui.pointer.clicked=false;
      }

      ui.wheel = 0;
      drawToasts();
      requestAnimationFrame(frame);
    }

    // ---------- Boot ----------
    tts.init();

    // Wire up iNaturalist modal
    (function(){
      const overlay  = document.getElementById('inatOverlay');
      const input    = document.getElementById('inatInput');
      const hint     = document.getElementById('inatHint');
      const loadBtn  = document.getElementById('inatLoadBtn');
      const cancelBtn= document.getElementById('inatCancelBtn');
      const tabUser  = document.getElementById('inatTabUser');
      const tabProj  = document.getElementById('inatTabProject');

      function setTab(type){
        inatState.type = type;
        tabUser.classList.toggle('active', type === 'user');
        tabProj.classList.toggle('active', type === 'project');
        input.placeholder = type === 'user'
          ? 'Enter iNaturalist username…'
          : 'Enter project slug or numeric ID…';
        hint.textContent = type === 'user'
          ? 'Fetches all research-grade observations with photos'
          : 'Fetches research-grade observations from a public project';
      }

      tabUser.addEventListener('click',  ()=> setTab('user'));
      tabProj.addEventListener('click',  ()=> setTab('project'));
      cancelBtn.addEventListener('click', hideINatModal);
      overlay.addEventListener('click', (e)=>{ if(e.target === overlay) hideINatModal(); });
      input.addEventListener('keydown', (e)=>{
        if(e.key === 'Enter'){ e.preventDefault(); if(!loadBtn.disabled) loadBtn.click(); }
        if(e.key === 'Escape') hideINatModal();
      });
      loadBtn.addEventListener('click', ()=>{
        if(inatState.loading) return;
        const val = input.value.trim();
        if(!val){ input.focus(); return; }
        loadFromINat(inatState.type, val);
      });
    })();

    toast('Ready — click Load iNat or drop a CSV to begin.', 'info', 3000);
    requestAnimationFrame(frame);

  } catch(e) {
    showError(e);
  }
})();
</script>
</body>
</html>
